<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit — Launch Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">
    <img src="/logo.svg" alt="RealWork Labs" class="nav-logo" />
  </a>

  <div class="nav-tabs">
    <a href="/" class="nav-tab nav-tab-active" title="Intake">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
    </a>
    <a href="/dashboard" class="nav-tab" title="Site Launches In Progress">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    </a>
    <a href="/dashboard?tab=edit-requests" class="nav-tab" title="Post-Launch Edits">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </a>
    <a href="/dashboard?tab=analytics" class="nav-tab" title="Insights">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </a>
  </div>

  <div class="nav-right">
    <span id="nav-user-email" class="nav-user-email"></span>
    <button id="logout-btn" class="btn btn-ghost" style="padding:.3rem .9rem;font-size:.8rem">Sign Out</button>
  </div>
</nav>

<div class="page">
  <h1>Website Intake Form</h1>
  <p class="subtitle">Fill out the form below to submit a new customer site for launch tracking.</p>

  <div class="card" id="form-card">
    <form id="launch-form" novalidate>
      <div class="form-grid">

        <div class="full">
          <label for="department">Department <span class="req">*</span></label>
          <select id="department" name="department" required>
            <option value="">Select your department…</option>
            <option value="Sales">Sales</option>
            <option value="Retention">Retention</option>
            <option value="Customer Success">Customer Success</option>
            <option value="CS-Renewal">CS-Renewal</option>
            <option value="Other">Other</option>
          </select>
          <div class="field-error" id="err-department"></div>
        </div>

        <div class="full">
          <label for="industry">Industry <span class="req">*</span></label>
          <select id="industry" name="industry" required>
            <option value="">Select an industry…</option>
            <option value="Roofing">Roofing</option>
            <option value="Plumbing">Plumbing</option>
            <option value="Electrical">Electrical</option>
            <option value="HVAC">HVAC</option>
            <option value="Landscaping">Landscaping</option>
            <option value="Contracting">Contracting</option>
            <option value="Restoration">Restoration</option>
            <option value="Solar">Solar</option>
            <option value="Flooring">Flooring</option>
            <option value="Other">Other</option>
          </select>
          <div class="field-error" id="err-industry"></div>
        </div>

        <div class="full">
          <label for="account_name">Account Name <span class="req">*</span></label>
          <input type="text" id="account_name" name="account_name" placeholder="e.g. Acme Corporation" required />
          <div class="field-error" id="err-account_name"></div>
        </div>

        <div class="full">
          <label for="domain_name">Domain Name <span class="req">*</span></label>
          <input type="text" id="domain_name" name="domain_name" placeholder="e.g. realworklabs.com" required />
          <div class="field-error" id="err-domain_name"></div>
        </div>

        <div class="full">
          <label for="contact_name">Contact Name <span class="req">*</span></label>
          <input type="text" id="contact_name" name="contact_name" placeholder="First Last" required />
          <div class="field-error" id="err-contact_name"></div>
        </div>

        <div>
          <label for="email">Email Address <span class="req">*</span></label>
          <input type="email" id="email" name="email" placeholder="contact@example.com" required />
          <div class="field-error" id="err-email"></div>
        </div>

        <div>
          <label for="phone">Phone Number <span class="req">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000" required />
          <div class="field-error" id="err-phone"></div>
        </div>

        <div class="full">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="3" placeholder="Any additional information…" style="resize:vertical"></textarea>
        </div>

      </div>

      <div class="form-actions">
        <button type="reset" class="btn btn-ghost">Clear</button>
        <button type="submit" class="btn btn-primary" id="submit-btn">
          Submit Launch Request
        </button>
      </div>
    </form>
  </div>

  <!-- Success state (hidden initially) -->
  <div class="card success-box" id="success-card" style="display:none">
    <div class="success-icon">🚀</div>
    <h2>Launch request submitted!</h2>
    <p>The site has been added to the tracker. You can monitor its progress on the dashboard.</p>
    <div class="success-links">
      <a href="/dashboard" class="btn btn-primary">View Dashboard</a>
      <button class="btn btn-ghost" id="submit-another">Submit Another</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<button id="dark-toggle" title="Toggle dark mode" onclick="toggleDark()">🌙</button>

<script>
document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
});

const FIELDS = ['department','industry','account_name','domain_name','contact_name','email','phone'];

function clearErrors() {
  FIELDS.forEach(f => {
    document.getElementById(f).classList.remove('error');
    document.getElementById('err-' + f).textContent = '';
  });
}

function showError(field, msg) {
  document.getElementById(field).classList.add('error');
  document.getElementById('err-' + field).textContent = msg;
}

function validate(data) {
  let ok = true;
  if (!data.department) { showError('department', 'Please select your department.'); ok = false; }
  if (!data.industry) { showError('industry', 'Please select an industry.'); ok = false; }
  if (!data.account_name.trim()) { showError('account_name', 'Account name is required.'); ok = false; }
  if (!data.domain_name.trim()) { showError('domain_name', 'Domain name is required.'); ok = false; }
  else if (!/^[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?\.[a-zA-Z]{2,}$/.test(data.domain_name.trim())) {
    showError('domain_name', 'Enter a valid domain (e.g. realworklabs.com).');
    ok = false;
  }
  if (!data.contact_name.trim()) { showError('contact_name', 'Contact name is required.'); ok = false; }
  else if (data.contact_name.trim().split(/\s+/).length < 2) {
    showError('contact_name', 'Please enter first and last name.');
    ok = false;
  }
  if (!data.email.trim()) { showError('email', 'Email address is required.'); ok = false; }
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email.trim())) {
    showError('email', 'Enter a valid email address.');
    ok = false;
  }
  if (!data.phone.trim()) { showError('phone', 'Phone number is required.'); ok = false; }
  return ok;
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, 3500);
}

document.getElementById('launch-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErrors();

  const data = {};
  FIELDS.forEach(f => data[f] = document.getElementById(f).value);
  data.notes = document.getElementById('notes').value;

  if (!validate(data)) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const res = await fetch('/api/launches', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Submission failed.');

    document.getElementById('form-card').style.display = 'none';
    document.getElementById('success-card').style.display = 'block';
  } catch (err) {
    showToast(err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Submit Launch Request';
  }
});

function toggleDark() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('dark-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
}
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.getElementById('dark-toggle').textContent = saved === 'dark' ? '☀️' : '🌙';
})();

document.getElementById('submit-another').addEventListener('click', () => {
  document.getElementById('launch-form').reset();
  document.getElementById('success-card').style.display = 'none';
  document.getElementById('form-card').style.display = 'block';
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.textContent = 'Submit Launch Request';
});

(async () => {
  try {
    const r = await fetch('/api/auth/me');
    if (r.ok) {
      const { email } = await r.json();
      const el = document.getElementById('nav-user-email');
      if (el && email) el.textContent = email;
    }
  } catch {}
})();
</script>
</body>
</html>
