<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Website Edits</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
  <style>
    .er-page { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .er-logo  { text-align: center; margin-bottom: 2rem; }
    .er-logo img { height: 44px; width: auto; object-fit: contain; }
    .er-logo .text-brand { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
    .er-logo .text-brand span { color: var(--text); }
    .er-page h1 { font-size: 1.4rem; margin-bottom: .35rem; }
    .er-page .subtitle { margin-bottom: 2rem; }

    .section-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      margin-bottom: .9rem;
    }
    .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

    /* Request block */
    .request-block {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      margin-bottom: .75rem;
      position: relative;
    }
    .request-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .65rem;
    }
    .request-number {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--primary);
    }
    .request-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: .85rem;
      cursor: pointer;
      padding: .1rem .3rem;
      border-radius: 4px;
      line-height: 1;
    }
    .request-remove:hover { color: #dc2626; background: #fee2e2; }

    .file-upload-label {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: .65rem;
      font-size: .8rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .file-input-wrap {
      margin-top: .3rem;
      display: flex;
      align-items: center;
      gap: .65rem;
    }
    .file-input-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .4rem .85rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: border-color .15s;
    }
    .file-input-btn:hover { border-color: var(--primary); color: var(--primary); }
    .file-input-btn input[type="file"] { display: none; }
    .file-chosen { font-size: .78rem; color: var(--text-muted); }

    #add-request-btn {
      width: 100%;
      border-style: dashed;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      font-size: .85rem;
    }
    #add-request-btn:hover { border-color: var(--primary); color: var(--primary); }

    @media (max-width: 500px) { .name-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="er-page">
  <div class="er-logo">
    <img src="/logo.png" alt="Logo" onerror="this.style.display='none';document.getElementById('er-brand').style.display='block'" />
    <div class="text-brand" id="er-brand" style="display:none"><span>Launch</span>Tracker</div>
  </div>

  <div class="card" id="form-card">
    <h1>Request Website Edits</h1>
    <p class="subtitle">Fill out the form below to submit edit requests for your existing site. You can add up to 3 requests at a time.</p>

    <form id="er-form" novalidate>

      <!-- Contact info -->
      <div class="section-label">Your Information</div>
      <div class="form-grid" style="margin-bottom:1.5rem">
        <div class="full">
          <label for="company_name">Company Name <span class="req">*</span></label>
          <input type="text" id="company_name" placeholder="Acme Roofing Co." autocomplete="organization" />
          <div class="field-error" id="err-company_name"></div>
        </div>
        <div class="name-row full">
          <div>
            <label for="first_name">First Name <span class="req">*</span></label>
            <input type="text" id="first_name" placeholder="Jane" autocomplete="given-name" />
            <div class="field-error" id="err-first_name"></div>
          </div>
          <div>
            <label for="last_name">Last Name <span class="req">*</span></label>
            <input type="text" id="last_name" placeholder="Smith" autocomplete="family-name" />
            <div class="field-error" id="err-last_name"></div>
          </div>
        </div>
        <div>
          <label for="er-email">Email <span class="req">*</span></label>
          <input type="email" id="er-email" placeholder="jane@acme.com" autocomplete="email" />
          <div class="field-error" id="err-er-email"></div>
        </div>
        <div>
          <label for="er-phone">Phone <span class="req">*</span></label>
          <input type="tel" id="er-phone" placeholder="(555) 000-0000" autocomplete="tel" />
          <div class="field-error" id="err-er-phone"></div>
        </div>
      </div>

      <!-- Edit requests -->
      <div class="section-label">Edit Requests</div>
      <div id="requests-container"></div>
      <button type="button" class="btn btn-ghost" id="add-request-btn">+ Add Another Request</button>
      <div class="field-error" id="err-requests"></div>

      <div class="form-actions">
        <button type="reset" class="btn btn-ghost" id="clear-btn">Clear</button>
        <button type="submit" class="btn btn-primary" id="submit-btn">Submit Edit Request</button>
      </div>
    </form>
  </div>

  <!-- Success -->
  <div class="card success-box" id="success-card" style="display:none">
    <div class="success-icon">✅</div>
    <h2>Request submitted!</h2>
    <p>We've received your edit request and will be in touch shortly.</p>
    <div class="success-links">
      <button class="btn btn-ghost" id="submit-another">Submit Another</button>
    </div>
  </div>
</div>

<button id="dark-toggle" title="Toggle dark mode" onclick="toggleDark()">🌙</button>
<div id="toast"></div>

<script>
// ── Dark mode ──
function toggleDark() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('dark-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
}
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.getElementById('dark-toggle').textContent = saved === 'dark' ? '☀️' : '🌙';
})();

// ── Toast ──
function showToast(msg, type = 'error') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, 3500);
}

// ── Request blocks ──
let requestCount = 0;
const MAX_REQUESTS = 3;

function buildRequestBlock(idx) {
  const div = document.createElement('div');
  div.className = 'request-block';
  div.dataset.idx = idx;
  div.innerHTML = `
    <div class="request-block-header">
      <span class="request-number">Request ${idx + 1}</span>
      ${idx > 0 ? `<button type="button" class="request-remove" onclick="removeRequest(this)" title="Remove">✕ Remove</button>` : ''}
    </div>
    <label for="req-desc-${idx}">Description <span class="req">*</span></label>
    <textarea id="req-desc-${idx}" rows="3" placeholder="Describe the change you'd like…" style="resize:vertical"></textarea>
    <div class="field-error" id="err-req-${idx}"></div>
    <div class="file-upload-label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Attach Image (optional)
    </div>
    <div class="file-input-wrap">
      <label class="file-input-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Choose Image
        <input type="file" accept="image/*" id="req-file-${idx}" onchange="updateFileName(this, ${idx})" />
      </label>
      <span class="file-chosen" id="file-name-${idx}">No file chosen</span>
    </div>`;
  return div;
}

function addRequest() {
  if (requestCount >= MAX_REQUESTS) return;
  const container = document.getElementById('requests-container');
  container.appendChild(buildRequestBlock(requestCount));
  requestCount++;
  if (requestCount >= MAX_REQUESTS) {
    document.getElementById('add-request-btn').style.display = 'none';
  }
}

function removeRequest(btn) {
  const block = btn.closest('.request-block');
  block.remove();
  requestCount--;
  // Re-number remaining blocks
  const blocks = document.querySelectorAll('.request-block');
  blocks.forEach((b, i) => {
    b.dataset.idx = i;
    b.querySelector('.request-number').textContent = `Request ${i + 1}`;
    const ta   = b.querySelector('textarea');
    const fe   = b.querySelector('.field-error');
    const fi   = b.querySelector('input[type="file"]');
    const fn   = b.querySelector('.file-chosen');
    const removeBtn = b.querySelector('.request-remove');
    ta.id  = `req-desc-${i}`;
    fe.id  = `err-req-${i}`;
    fi.id  = `req-file-${i}`;
    fi.setAttribute('onchange', `updateFileName(this, ${i})`);
    fn.id  = `file-name-${i}`;
    if (removeBtn) removeBtn.setAttribute('onclick', 'removeRequest(this)');
    if (i === 0 && removeBtn) removeBtn.remove();
  });
  document.getElementById('add-request-btn').style.display = '';
}

function updateFileName(input, idx) {
  const label = document.getElementById(`file-name-${idx}`);
  label.textContent = input.files[0] ? input.files[0].name : 'No file chosen';
}

// Init with first block
addRequest();
document.getElementById('add-request-btn').addEventListener('click', addRequest);

// ── Validation ──
function showError(id, msg) {
  const el = document.getElementById(`err-${id}`);
  if (el) el.textContent = msg;
}
function clearErrors() {
  document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
}

function validate() {
  clearErrors();
  let ok = true;
  if (!document.getElementById('company_name').value.trim()) { showError('company_name', 'Company name is required.'); ok = false; }
  if (!document.getElementById('first_name').value.trim())   { showError('first_name',   'First name is required.'); ok = false; }
  if (!document.getElementById('last_name').value.trim())    { showError('last_name',    'Last name is required.'); ok = false; }
  const email = document.getElementById('er-email').value.trim();
  if (!email) { showError('er-email', 'Email is required.'); ok = false; }
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('er-email', 'Invalid email address.'); ok = false; }
  if (!document.getElementById('er-phone').value.trim()) { showError('er-phone', 'Phone is required.'); ok = false; }

  const blocks = document.querySelectorAll('.request-block');
  let hasRequest = false;
  blocks.forEach((b, i) => {
    const desc = b.querySelector('textarea').value.trim();
    if (!desc) { showError(`req-${i}`, 'Please describe this request.'); ok = false; }
    else hasRequest = true;
  });
  if (!hasRequest) { document.getElementById('err-requests').textContent = 'Add at least one request.'; ok = false; }
  return ok;
}

// ── Submit ──
document.getElementById('er-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!validate()) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  const fd = new FormData();
  fd.append('company_name', document.getElementById('company_name').value.trim());
  fd.append('first_name',   document.getElementById('first_name').value.trim());
  fd.append('last_name',    document.getElementById('last_name').value.trim());
  fd.append('email',        document.getElementById('er-email').value.trim());
  fd.append('phone',        document.getElementById('er-phone').value.trim());

  document.querySelectorAll('.request-block').forEach((b, i) => {
    fd.append(`request_${i}_description`, b.querySelector('textarea').value.trim());
    const file = b.querySelector('input[type="file"]').files[0];
    if (file) fd.append(`request_${i}_image`, file);
  });

  try {
    const res  = await fetch('/api/edit-requests', { method: 'POST', body: fd });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Submission failed.');
    document.getElementById('form-card').style.display   = 'none';
    document.getElementById('success-card').style.display = 'block';
  } catch (err) {
    showToast(err.message);
    btn.disabled = false;
    btn.textContent = 'Submit Edit Request';
  }
});

document.getElementById('clear-btn').addEventListener('click', () => {
  clearErrors();
});

document.getElementById('submit-another').addEventListener('click', () => {
  // Reset form
  document.getElementById('requests-container').innerHTML = '';
  requestCount = 0;
  addRequest();
  document.getElementById('add-request-btn').style.display = '';
  document.getElementById('er-form').reset();
  clearErrors();
  document.getElementById('success-card').style.display = 'none';
  document.getElementById('form-card').style.display    = 'block';
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.textContent = 'Submit Edit Request';
});
</script>
</body>
</html>
