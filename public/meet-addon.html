<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding · Meet</title>
<link rel="icon" href="/favicon.png" type="image/png" />
<style>
:root { --primary: #1259FF; --bg: #06102a; --surface: #0f1d3a; --lime: #cbff4d; --text: #fff; --text-muted: rgba(255,255,255,.5); --border: rgba(255,255,255,.1); --green: #16a34a }
* { margin: 0; padding: 0; box-sizing: border-box }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden }

/* Header */
.ma-header { padding: .6rem .75rem; display: flex; align-items: center; gap: .5rem; border-bottom: 1px solid var(--border) }
.ma-logo { height: 18px; opacity: .7 }
.ma-header-title { font-size: .7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px }

/* Auth */
.ma-auth { display: none; padding: 2rem 1rem; text-align: center }
.ma-auth input { width: 100%; padding: .5rem .7rem; border: 1px solid var(--border); border-radius: 6px; font-size: .82rem; font-family: inherit; color: var(--text); background: var(--surface); margin: .75rem 0 .5rem; box-sizing: border-box }
.ma-auth input:focus { outline: none; border-color: var(--primary) }
.ma-auth-btn { width: 100%; padding: .55rem; border: none; border-radius: 6px; background: var(--primary); color: #fff; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: inherit }
.ma-auth-err { font-size: .72rem; color: #ef4444; margin-top: .3rem; display: none }

/* Phases */
.ma-phase { display: none; padding: .75rem }
.ma-phase.active { display: block }

/* Client search */
.ma-search { width: 100%; padding: .5rem .7rem; border: 1px solid var(--border); border-radius: 6px; font-size: .82rem; font-family: inherit; color: var(--text); background: var(--surface); box-sizing: border-box; margin-bottom: .5rem }
.ma-search:focus { outline: none; border-color: var(--primary) }
.ma-client { padding: .45rem .6rem; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; margin-bottom: .3rem; transition: border-color .15s }
.ma-client:hover { border-color: var(--primary) }
.ma-client-name { font-size: .8rem; font-weight: 600 }
.ma-client-meta { font-size: .68rem; color: var(--text-muted) }

/* Interview guide */
.ma-guide { padding: .75rem }
.ma-guide-client { font-size: .85rem; font-weight: 700; margin-bottom: .15rem }
.ma-guide-progress { font-size: .68rem; color: var(--text-muted); margin-bottom: .75rem }
.ma-guide-section { font-size: .6rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: .3rem }
.ma-guide-question { font-size: .95rem; font-weight: 600; line-height: 1.4; margin-bottom: .5rem }
.ma-guide-tips { font-size: .72rem; color: var(--text-muted); line-height: 1.45; margin-bottom: .75rem; padding: .5rem .65rem; background: var(--surface); border-radius: 6px; border-left: 3px solid var(--primary) }
.ma-guide-followups { margin-bottom: .75rem }
.ma-guide-followups-label { font-size: .62rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .3px; margin-bottom: .25rem }
.ma-guide-followup { font-size: .72rem; color: rgba(255,255,255,.7); padding: .2rem 0; padding-left: .6rem; position: relative }
.ma-guide-followup::before { content: ''; position: absolute; left: 0; top: .45rem; width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted) }
.ma-guide-btns { display: flex; gap: .4rem }
.ma-btn-skip { flex: 0; padding: .45rem .75rem; border: 1px solid var(--border); border-radius: 6px; background: none; color: var(--text-muted); font-size: .75rem; font-weight: 600; cursor: pointer; font-family: inherit }
.ma-btn-next { flex: 1; padding: .45rem .75rem; border: none; border-radius: 6px; background: var(--green); color: #fff; font-size: .78rem; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: .3rem }
.ma-guide-divider { height: 1px; background: var(--border); margin: .75rem 0 }
.ma-guide-note { font-size: .72rem; color: var(--text-muted); line-height: 1.4 }
.ma-guide-note strong { color: var(--text); font-weight: 600 }

/* Section complete */
.ma-section-done { background: var(--surface); border-radius: 8px; padding: .65rem .75rem; margin-bottom: .75rem; border-left: 3px solid var(--lime) }
.ma-section-done-title { font-size: .72rem; font-weight: 700; color: var(--lime) }
.ma-section-done-text { font-size: .7rem; color: var(--text-muted); margin-top: .15rem }

/* Transcript */
.ma-transcript-bar { display: flex; gap: .4rem; margin-bottom: .6rem }
.ma-btn-transcript { flex: 1; padding: .4rem .6rem; border: 1px solid var(--primary); border-radius: 6px; background: none; color: var(--primary); font-size: .72rem; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: .3rem }
.ma-btn-transcript.active { background: var(--primary); color: #fff }
.ma-btn-transcript-stop { flex: 0; padding: .4rem .6rem; border: 1px solid #ef4444; border-radius: 6px; background: none; color: #ef4444; font-size: .72rem; font-weight: 600; cursor: pointer; font-family: inherit; display: none }
.ma-transcript-box { max-height: 140px; overflow-y: auto; background: var(--surface); border-radius: 6px; padding: .5rem .6rem; margin-bottom: .6rem; font-size: .74rem; line-height: 1.5; display: none; border: 1px solid var(--border) }
.ma-transcript-box .interim { color: var(--text-muted) }
.ma-transcript-box .final { color: var(--text) }
.ma-transcript-empty { color: var(--text-muted); font-style: italic }
.ma-transcript-status { font-size: .65rem; color: var(--text-muted); margin-bottom: .4rem; display: none }
.ma-transcript-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--lime); margin-right: 4px; vertical-align: middle; animation: ma-pulse 1.5s infinite }
@keyframes ma-pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }

/* AI recommendation badges */
.ma-ai-rec { padding: .4rem .6rem; border-radius: 6px; font-size: .72rem; line-height: 1.4; margin-bottom: .5rem; display: none }
.ma-ai-rec.ready { display: block; background: rgba(22,163,74,.12); border: 1px solid rgba(22,163,74,.25); color: #4ade80 }
.ma-ai-rec.followup { display: block; background: rgba(234,179,8,.1); border: 1px solid rgba(234,179,8,.2); color: #facc15 }
.ma-ai-rec.thinking { display: block; background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--text-muted) }

/* Finish screen */
.ma-finish { display: none; padding: 1.5rem .75rem; text-align: center }
.ma-finish-title { font-size: 1rem; font-weight: 700; margin-bottom: .4rem }
.ma-finish-sub { font-size: .82rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1rem }
.ma-finish-btn { width: 100%; padding: .55rem; border: none; border-radius: 6px; background: var(--primary); color: #fff; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: .4rem }
.ma-finish-btn-outline { width: 100%; padding: .55rem; border: 1px solid var(--border); border-radius: 6px; background: none; color: var(--text); font-size: .82rem; font-weight: 600; cursor: pointer; font-family: inherit }
.ma-finish-status { font-size: .75rem; color: var(--text-muted); margin-top: .5rem }
</style>
</head>
<body>

<div class="ma-header">
  <img src="/logo-white.svg" alt="RealWork" class="ma-logo">
  <span class="ma-header-title">Onboarding</span>
</div>

<!-- Auth -->
<div class="ma-auth" id="ma-auth">
  <div style="font-size:.95rem;font-weight:700;margin-bottom:.3rem">Connect to RealWork</div>
  <div style="font-size:.78rem;color:var(--text-muted);line-height:1.4">Get your access code from the Onboarding page (click "Copy Meet Code") and paste it below.</div>
  <input type="text" id="ma-token-input" placeholder="Paste access code..." onkeydown="if(event.key==='Enter')submitToken()">
  <button class="ma-auth-btn" onclick="submitToken()">Connect</button>
  <div class="ma-auth-err" id="ma-auth-err"></div>
</div>

<!-- Phase 1: Client Selection -->
<div class="ma-phase" id="ma-phase-select">
  <div style="font-size:.85rem;font-weight:700;margin-bottom:.5rem">Select a client</div>
  <input type="text" class="ma-search" id="ma-search" placeholder="Search clients..." oninput="searchClients()">
  <div id="ma-clients-list"></div>
</div>

<!-- Phase 2: Interview Guide -->
<div class="ma-phase" id="ma-phase-guide">
  <div class="ma-guide" id="ma-guide"></div>
</div>

<!-- Phase 3: Finish -->
<div class="ma-finish" id="ma-finish">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--lime)" stroke-width="2" style="margin-bottom:.75rem"><circle cx="12" cy="12" r="10"/><polyline points="20 6 9 17 4 12" stroke-width="2.5"/></svg>
  <div class="ma-finish-title">Interview Complete</div>
  <div class="ma-finish-sub">Great job! The AI is extracting the client profile from the live transcript.</div>
  <button class="ma-finish-btn-outline" onclick="importMeetTranscript()" style="margin-bottom:.4rem">Import Meet Transcript</button>
  <button class="ma-finish-btn-outline" onclick="manualExtract()">Extract from Notes</button>
  <div class="ma-finish-status" id="ma-finish-status"></div>
</div>

<script src="https://www.gstatic.com/meetjs/addons/1.1.0/meet.addons.js"></script>
<script>
// ── Questions ──
const QUESTIONS = [
  { id:'origin_1', section:'Origin Story', label:'Tell us your story — how did you get into this trade and start your business?', tips:'Ask about when they started, what motivated them, how long they\'ve been in business.', followups:['How long have you been in business?','Was there a specific moment that pushed you to start your own company?'] },
  { id:'origin_2', section:'Origin Story', label:'What makes you most proud about your company?', tips:'Listen for milestones, team achievements, specific projects they light up about.', followups:['Can you tell me about a project that really stands out?'] },
  { id:'origin_3', section:'Origin Story', label:'Is there a family or personal story connected to the business?', tips:'Family involvement, personal connection to the trade. This makes great About page copy.', followups:['Are any family members involved in day-to-day operations?'] },
  { id:'services_1', section:'Services', label:'Walk me through your core services — what do you do?', tips:'Get the full list. Ask about residential vs commercial, emergency availability.', followups:['Do you handle both residential and commercial?','Do you offer emergency or after-hours service?'] },
  { id:'services_2', section:'Services', label:'Which service is your bread and butter, and which do you want to grow?', tips:'Top revenue service AND what they want the website to push more.', followups:['Why do you want to push those services more?'] },
  { id:'services_3', section:'Services', label:'Describe your process from the first call to job completion.', tips:'This becomes the "How We Work" section. Get the step-by-step.', followups:['What happens after the job — any follow-up, warranty check-in?'] },
  { id:'diff_1', section:'Differentiation', label:'What makes you different from competitors — and what do customers say about you?', tips:'Their edge, review themes, guarantees, unique processes. This is the USP.', followups:['Do you use specific brands or methods that set you apart?','Do you offer any guarantees?'] },
  { id:'diff_2', section:'Differentiation', label:'Who is your ideal customer?', tips:'Residential vs commercial, neighborhood type, job size preference.', followups:['Is there a type of job you prefer to avoid?'] },
  { id:'area_1', section:'Service Area', label:'What areas do you serve, and where do you get the most work?', tips:'Cities, counties, travel radius. Top markets for city landing pages.', followups:['How far will you travel for a job?','Are there areas you want to expand into?'] },
  { id:'area_2', section:'Service Area', label:'Are there specific neighborhoods or cities you want to target for growth?', tips:'New markets, less competition areas. Important for SEO targeting.', followups:['Do you have any presence there already?'] },
  { id:'voice_1', section:'Brand Voice', label:'How would you describe your company\'s personality and tone?', tips:'Professional, casual, friendly — how do they talk to customers? This calibrates all copy.', followups:['How do you want customers to feel after working with you?'] },
  { id:'voice_2', section:'Brand Voice', label:'Any words, phrases, or taglines you love — or want to avoid on the website?', tips:'Mottos, jargon to avoid, specific language preferences.', followups:['Do you have a tagline or motto?'] },
  { id:'cred_1', section:'Credentials', label:'What licenses, certifications, and insurance do you carry?', tips:'State licenses, manufacturer certs, bonded, insured. Trust signals.', followups:['Are you a member of any trade associations?'] },
  { id:'cred_2', section:'Credentials', label:'Any awards, recognitions, or things you want to highlight?', tips:'Google rating, best-of awards, community involvement.', followups:['How many Google reviews do you have?'] },
  { id:'goals_1', section:'Goals', label:'What are your top goals for the new website?', tips:'More leads, SEO, professional look. Get specific priorities.', followups:['What frustrates you about your current online presence?'] },
  { id:'goals_2', section:'Goals', label:'What does success look like 6 months from now?', tips:'Measurable targets — lead count, ranking goals, revenue impact.', followups:['Specific number of leads per month you\'re targeting?'] },
  { id:'goals_3', section:'Goals', label:'Anything else we should know about your business?', tips:'Open-ended catch-all. Let them talk.', followups:[] },
];
const SECTIONS = ['Origin Story','Services','Differentiation','Service Area','Brand Voice','Credentials','Goals'];

// ── State ──
let authToken = null;
let sessionId = null;
let joinToken = null;
let currentQ = 0;
let selectedClientId = null;
let clientName = '';
let meetSession = null;
let sidePanelClient = null;
let completedSections = new Set();
let transcriptActive = false;
let transcriptText = '';
let capturePopup = null;
let transcriptChannel = null;
let interimText = '';
let questionTranscripts = {};
let currentQuestionTranscript = '';
let evalTimer = null;
let lastEvalText = '';
let aiRecState = null; // { action, message }

function authHeaders(h = {}) { if (authToken) h['Authorization'] = 'Bearer ' + authToken; return h; }
function authFetch(url, opts = {}) { opts.headers = authHeaders(opts.headers || {}); return fetch(url, opts); }
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

// ── Init ──
(async () => {
  try {
    meetSession = await window.meet.addon.createAddonSession({ cloudProjectNumber: '630073859512' });
    sidePanelClient = await meetSession.createSidePanelClient();
  } catch (e) { console.warn('Meet SDK:', e.message); }

  // Try cookie auth first (works if SameSite=None; Secure is set)
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) {
      // Cookies work! Get a token for Bearer auth on subsequent calls
      const tr = await fetch('/api/auth/meet-token', { credentials: 'include' });
      const td = await tr.json();
      if (td.token) {
        authToken = td.token;
        try { sessionStorage.setItem('ma-token', authToken); } catch {}
        showPhase('select');
        loadClients();
        return;
      }
    }
  } catch {}

  // Check URL token or sessionStorage
  const params = new URLSearchParams(window.location.search);
  authToken = params.get('token');
  if (!authToken) try { authToken = sessionStorage.getItem('ma-token'); } catch {}

  if (authToken) {
    try {
      const r = await authFetch('/api/auth/me');
      if (r.ok) { showPhase('select'); loadClients(); return; }
    } catch {}
    authToken = null;
  }
  document.getElementById('ma-auth').style.display = 'block';
})();

// ── Auth ──
async function submitToken() {
  const input = document.getElementById('ma-token-input');
  const err = document.getElementById('ma-auth-err');
  authToken = input.value.trim();
  if (!authToken) { err.textContent = 'Paste your access code.'; err.style.display = 'block'; return; }
  try {
    const r = await authFetch('/api/auth/me');
    if (!r.ok) throw new Error();
    try { sessionStorage.setItem('ma-token', authToken); } catch {}
    document.getElementById('ma-auth').style.display = 'none';
    showPhase('select');
    loadClients();
  } catch {
    authToken = null;
    err.textContent = 'Invalid code. Copy it again from the Onboarding page.';
    err.style.display = 'block';
  }
}

// ── Phases ──
function showPhase(id) {
  document.querySelectorAll('.ma-phase').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('ma-phase-' + id);
  if (el) el.classList.add('active');
  document.getElementById('ma-finish').style.display = 'none';
}

// ── Client search ──
let searchTimer = null;
async function loadClients() { searchClients(); }
async function searchClients() {
  clearTimeout(searchTimer);
  const term = document.getElementById('ma-search').value.trim();
  searchTimer = setTimeout(async () => {
    try {
      const r = await authFetch(`/api/onboarding/clients${term ? '?search=' + encodeURIComponent(term) : ''}`);
      const clients = await r.json();
      const list = document.getElementById('ma-clients-list');
      if (!clients.length) { list.innerHTML = '<div style="font-size:.78rem;color:var(--text-muted);padding:.5rem 0;text-align:center">No clients found</div>'; return; }
      list.innerHTML = clients.slice(0, 15).map(c => `<div class="ma-client" onclick="selectClient(${JSON.stringify(c).replace(/"/g,'&quot;')})"><div class="ma-client-name">${esc(c.account_name)}</div><div class="ma-client-meta">${esc([c.contact_name, c.industry].filter(Boolean).join(' · '))}</div></div>`).join('');
    } catch {}
  }, 200);
}

async function selectClient(client) {
  selectedClientId = client.id;
  clientName = client.account_name;
  // Create session
  try {
    const r = await authFetch('/api/onboarding/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clientName, clientId: selectedClientId }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    sessionId = data.id;
    joinToken = data.join_token || null;
    currentQ = 0;
    completedSections.clear();
    showPhase('guide');
    renderGuide();
  } catch (err) { alert('Failed to start: ' + err.message); }
}

// ── Interview Guide ──
function renderGuide() {
  const q = QUESTIONS[currentQ];
  if (!q) { showFinish(); return; }

  const prevSection = currentQ > 0 ? QUESTIONS[currentQ - 1].section : null;
  const isNewSection = q.section !== prevSection;

  let html = '';
  html += `<div class="ma-guide-client">${esc(clientName)}</div>`;
  html += `<div class="ma-guide-progress">Question ${currentQ + 1} of ${QUESTIONS.length}</div>`;

  // Share buttons
  if (joinToken) {
    html += '<div style="display:flex;gap:.3rem;margin-bottom:.6rem">';
    html += `<button onclick="showToAll()" style="flex:1;padding:.35rem .5rem;border:none;border-radius:5px;background:var(--primary);color:#fff;font-size:.68rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.3rem"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Start Presentation</button>`;
    html += `<button onclick="copyJoinLink(this)" style="flex:0;padding:.35rem .5rem;border:1px solid var(--border);border-radius:5px;background:none;color:var(--text-muted);font-size:.68rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> Copy Link</button>`;
    html += '</div>';
  }

  // Show completed section badges
  SECTIONS.forEach((s, i) => {
    if (completedSections.has(i)) {
      html += `<div class="ma-section-done"><div class="ma-section-done-title">${esc(s)} complete</div></div>`;
    }
  });

  html += `<div class="ma-guide-section">${esc(q.section)}</div>`;
  html += `<div class="ma-guide-question">${esc(q.label)}</div>`;

  if (q.tips) {
    html += `<div class="ma-guide-tips"><strong>Ask about:</strong> ${esc(q.tips)}</div>`;
  }

  if (q.followups?.length) {
    html += '<div class="ma-guide-followups"><div class="ma-guide-followups-label">Follow-up if needed</div>';
    q.followups.forEach(f => { html += `<div class="ma-guide-followup">${esc(f)}</div>`; });
    html += '</div>';
  }

  // Transcript controls
  html += '<div class="ma-transcript-bar">';
  html += `<button class="ma-btn-transcript${transcriptActive ? ' active' : ''}" id="ma-btn-transcript" onclick="toggleTranscript()">${transcriptActive ? '<span class="ma-transcript-dot"></span>Listening...' : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg> Live Transcript'}</button>`;
  if (transcriptActive) html += '<button class="ma-btn-transcript-stop" style="display:inline-block" onclick="stopTranscript()">Stop</button>';
  html += '</div>';
  html += '<div class="ma-transcript-status" id="ma-transcript-status"' + (transcriptActive ? ' style="display:block"' : '') + '><span class="ma-transcript-dot"></span>Live transcription active</div>';
  html += '<div class="ma-transcript-box" id="ma-transcript-box"' + (transcriptActive ? ' style="display:block"' : '') + '>' + (transcriptText || '<span class="ma-transcript-empty">Transcript will appear here...</span>') + '</div>';

  // AI recommendation badge
  html += '<div class="ma-ai-rec' + (aiRecState ? (aiRecState.action === 'next' ? ' ready' : ' followup') : '') + '" id="ma-ai-rec">';
  if (aiRecState) {
    if (aiRecState.action === 'next') {
      html += 'Answer sounds complete &mdash; ready to move on' + (aiRecState.message ? '<br><span style="opacity:.8;font-size:.68rem">' + esc(aiRecState.message) + '</span>' : '');
    } else if (aiRecState.action === 'followup') {
      html += 'Consider asking: ' + esc(aiRecState.message);
    } else if (aiRecState.action === 'clarify') {
      html += 'Answer was unclear &mdash; try rephrasing the question';
    }
  }
  html += '</div>';

  html += '<div class="ma-guide-btns">';
  html += '<button class="ma-btn-skip" onclick="skipQuestion()">Skip</button>';
  html += `<button class="ma-btn-next" onclick="nextQuestion()">Next <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>`;
  html += '</div>';

  html += '<div class="ma-guide-divider"></div>';
  html += '<div class="ma-guide-note"><strong>Tip:</strong> Just have a natural conversation. Meet is recording the transcript — the AI will extract everything after the call.</div>';

  document.getElementById('ma-guide').innerHTML = html;

  // Save progress + sync current question text to Firestore for the main stage
  authFetch(`/api/onboarding/sessions/${sessionId}/answer`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ questionId: null, currentQuestion: currentQ, aiMessage: q.label, clearSummary: true }),
  }).then(r => {
    if (!r.ok) console.error('[meet-addon] Failed to save question state:', r.status);
    else console.log('[meet-addon] Saved question', currentQ, 'to Firestore');
  }).catch(e => console.error('[meet-addon] Save error:', e.message));
}

async function nextQuestion() {
  const q = QUESTIONS[currentQ];
  const nextQ = QUESTIONS[currentQ + 1];

  // Save per-question transcript and reset
  questionTranscripts[currentQ] = currentQuestionTranscript;

  // Persist per-question transcript to Firestore in real-time
  if (currentQuestionTranscript.trim()) {
    authFetch(`/api/onboarding/sessions/${sessionId}/answer`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        questionId: QUESTIONS[currentQ].id,
        answer: currentQuestionTranscript,
        currentQuestion: currentQ + 1,
        aiMessage: QUESTIONS[currentQ + 1]?.label || null,
        clearSummary: true,
      }),
    }).catch(() => {});
  }

  currentQuestionTranscript = '';
  aiRecState = null;
  lastEvalText = '';

  // Check if section is completing
  const isEndOfSection = (nextQ && nextQ.section !== q.section) || !nextQ;
  if (isEndOfSection) {
    const sIdx = SECTIONS.indexOf(q.section);
    if (sIdx >= 0) completedSections.add(sIdx);

    // Generate section summary for the main stage slideshow
    const sectionQs = QUESTIONS.filter(qq => qq.section === q.section);
    const sectionAnswers = sectionQs.map(qq => {
      const idx = QUESTIONS.indexOf(qq);
      return { question: qq.label, answer: questionTranscripts[idx] || '' };
    });
    // Fire and forget — don't block navigation
    authFetch(`/api/onboarding/sessions/${sessionId}/section-summary`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sectionName: q.section, sectionIndex: sIdx, answers: sectionAnswers, clientName }),
    }).catch(() => {});
  }

  currentQ++;
  if (currentQ >= QUESTIONS.length) { showFinish(); return; }
  renderGuide();
}

function skipQuestion() {
  nextQuestion();
}

// ── Finish ──
async function showFinish() {
  // 1. Save the last question's transcript
  if (currentQuestionTranscript) {
    questionTranscripts[currentQ] = currentQuestionTranscript;
    currentQuestionTranscript = '';
  }

  // 2. Stop the evaluation timer
  stopEvalTimer();
  aiRecState = null;

  // 3. Stop audio capture
  if (transcriptActive) {
    stopTranscript();
  }

  document.querySelectorAll('.ma-phase').forEach(el => el.classList.remove('active'));
  const finishEl = document.getElementById('ma-finish');
  finishEl.style.display = 'block';
  const status = document.getElementById('ma-finish-status');

  // 4. Save ALL questionTranscripts to Firestore as answers on the session
  const hasRealAnswers = Object.values(questionTranscripts).some(t => t && t.trim().length > 0);
  if (hasRealAnswers) {
    status.innerHTML = '<span style="color:var(--text-muted)">Saving transcripts...</span>';
    const savePromises = Object.entries(questionTranscripts).map(([idx, text]) => {
      if (!text || !text.trim()) return Promise.resolve();
      const q = QUESTIONS[parseInt(idx)];
      if (!q) return Promise.resolve();
      return authFetch(`/api/onboarding/sessions/${sessionId}/answer`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          questionId: q.id,
          answer: text,
          currentQuestion: parseInt(idx),
        }),
      }).catch(() => {});
    });
    await Promise.all(savePromises);

    // 5. Generate the final section summary if the last section wasn't completed yet
    const lastQ = QUESTIONS[QUESTIONS.length - 1];
    const lastSIdx = SECTIONS.indexOf(lastQ.section);
    if (lastSIdx >= 0 && !completedSections.has(lastSIdx)) {
      completedSections.add(lastSIdx);
      const sectionQs = QUESTIONS.filter(qq => qq.section === lastQ.section);
      const sectionAnswers = sectionQs.map(qq => {
        const idx = QUESTIONS.indexOf(qq);
        return { question: qq.label, answer: questionTranscripts[idx] || '' };
      });
      authFetch(`/api/onboarding/sessions/${sessionId}/section-summary`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sectionName: lastQ.section, sectionIndex: lastSIdx, answers: sectionAnswers, clientName }),
      }).catch(() => {});
    }

    // 6. Run extraction using the real transcripts
    // 7. Push transcript to Google Drive (handled server-side in extract endpoint)
    // 8. Show extraction progress + result
    await autoExtractFromTranscript();
    // 9. Session status set to extracted by extract endpoint (triggers completion on presentation)
  }
}

async function autoExtractFromTranscript() {
  const status = document.getElementById('ma-finish-status');
  status.innerHTML = '<span style="color:var(--text-muted)">Extracting profile from live transcript...</span>';

  try {
    const questionsPayload = QUESTIONS.map((q, i) => ({
      id: q.id,
      label: q.label,
      section: q.section,
      answer: questionTranscripts[i] || '(not discussed)',
    }));
    const r = await authFetch(`/api/onboarding/sessions/${sessionId}/extract`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questions: questionsPayload }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    status.innerHTML = '<span style="color:var(--lime)">Profile extracted from live transcript! View it in the dashboard.</span>';
  } catch (err) {
    status.innerHTML = 'Auto-extraction failed: ' + esc(err.message) + '. Use the buttons below to try again.';
  }
}

async function importMeetTranscript() {
  const status = document.getElementById('ma-finish-status');
  status.textContent = 'Searching for Meet transcript in Drive...';
  try {
    const r = await authFetch(`/api/onboarding/sessions/${sessionId}/import-meet-transcript`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    status.innerHTML = '<span style="color:var(--lime)">Profile extracted successfully!</span>';
  } catch (err) {
    status.textContent = 'Import failed: ' + err.message + '. Try "Extract from Notes" or upload the transcript from the Onboarding page.';
  }
}

// ── Live Transcript ──
const EXTENSION_ID = ''; // Will be set after installing the extension
let extensionDetected = false;
let transcriptPollTimer = null;
let lastTranscriptIdx = 0;

// Try to detect the Chrome extension on load
function detectExtension() {
  if (!chrome?.runtime?.sendMessage) return;
  // Try known extension IDs, or use externally_connectable
  // The sidebar can't directly message the extension from inside Meet's iframe
  // Instead, we use the popup fallback + BroadcastChannel approach
}

function toggleTranscript() {
  if (transcriptActive) return;
  transcriptActive = true;
  transcriptText = '';
  interimText = '';

  // Try popup approach (works when sidebar can open popups)
  try {
    capturePopup = window.open(
      '/meet-addon-capture?token=' + encodeURIComponent(authToken) + '&mode=tab',
      'audio-capture',
      'width=700,height=500,left=100,top=100'
    );
  } catch {}

  // Listen on BroadcastChannel (from popup or extension)
  try {
    transcriptChannel = new BroadcastChannel('meet-transcript');
    transcriptChannel.onmessage = (evt) => {
      handleTranscriptMessage(evt.data);
    };
  } catch {}

  // Also listen via postMessage as fallback (BroadcastChannel may not work across iframe origins)
  window.addEventListener('message', (evt) => {
    if (evt.data?.type === 'rw-transcript') {
      handleTranscriptMessage({ type: 'transcript', text: evt.data.text, isFinal: evt.data.isFinal });
    }
  });

  // Start AI evaluation timer
  startEvalTimer();

  // If popup was blocked, show instructions
  if (!capturePopup || capturePopup.closed) {
    // Open as a new tab instead
    const win = window.open('/meet-addon-capture?token=' + encodeURIComponent(authToken) + '&mode=tab', '_blank');
    if (!win) {
      alert('Please allow popups for this site, or open this URL manually:\n' + location.origin + '/meet-addon-capture?token=' + authToken);
    }
  }

  renderGuide();
}

// ── Show to all participants via Meet main stage ──
function showToAll() {
  if (!sessionId || !joinToken) return;
  const stageUrl = `${location.origin}/meet-stage?session=${sessionId}&token=${joinToken}`;
  // Open the presentation in a new tab — the rep shares this tab in Meet
  // Note: startActivity only works for participants with the add-on installed,
  // which external contractors won't have. Screen sharing is the reliable path.
  window.open(stageUrl, 'rw-presentation');
}

function copyJoinLink(btn) {
  if (!sessionId || !joinToken) return;
  const url = `${location.origin}/join/${sessionId}/${joinToken}`;
  navigator.clipboard.writeText(url).then(() => {
    btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
    btn.style.color = '#16a34a';
    btn.style.borderColor = '#16a34a';
    setTimeout(() => {
      btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> Copy Link';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
}

function handleTranscriptMessage(msg) {
  if (msg.type === 'transcript') {
    if (msg.isFinal) {
      transcriptText += (transcriptText ? ' ' : '') + msg.text;
      currentQuestionTranscript += (currentQuestionTranscript ? ' ' : '') + msg.text;
      interimText = '';
    } else {
      interimText = msg.text;
    }
    updateTranscriptBox();
  } else if (msg.type === 'stopped') {
    stopTranscript();
  }
}

function stopTranscript() {
  transcriptActive = false;
  stopEvalTimer();
  if (capturePopup && !capturePopup.closed) {
    capturePopup.close();
  }
  capturePopup = null;
  if (transcriptChannel) {
    transcriptChannel.close();
    transcriptChannel = null;
  }
  interimText = '';
  renderGuide();
}

function startEvalTimer() {
  stopEvalTimer();
  evalTimer = setInterval(() => { evaluateTranscript(); }, 15000);
}

function stopEvalTimer() {
  if (evalTimer) { clearInterval(evalTimer); evalTimer = null; }
}

async function evaluateTranscript() {
  const text = currentQuestionTranscript.trim();
  // Don't evaluate if no new text or fewer than 5 words
  if (!text || text === lastEvalText) return;
  const wordCount = text.split(/\s+/).length;
  if (wordCount < 5) return;

  lastEvalText = text;
  const q = QUESTIONS[currentQ];
  if (!q) return;

  // Show thinking state
  const recEl = document.getElementById('ma-ai-rec');
  if (recEl) { recEl.className = 'ma-ai-rec thinking'; recEl.style.display = 'block'; recEl.textContent = 'AI is evaluating the response...'; }

  try {
    const r = await authFetch('/api/onboarding/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: q.label,
        answer: text,
        followups: q.followups || [],
        sectionName: q.section,
        clientName: clientName,
        alreadyFollowedUp: false,
      }),
    });
    const data = await r.json();
    aiRecState = data;

    // Update badge in-place without full re-render
    const el = document.getElementById('ma-ai-rec');
    if (el) {
      if (data.action === 'next') {
        el.className = 'ma-ai-rec ready';
        el.innerHTML = 'Answer sounds complete &mdash; ready to move on' + (data.message ? '<br><span style="opacity:.8;font-size:.68rem">' + esc(data.message) + '</span>' : '');
      } else if (data.action === 'followup') {
        el.className = 'ma-ai-rec followup';
        el.innerHTML = 'Consider asking: ' + esc(data.message);
      } else if (data.action === 'clarify') {
        el.className = 'ma-ai-rec followup';
        el.innerHTML = 'Answer was unclear &mdash; try rephrasing the question';
      }
    }
  } catch (err) {
    console.warn('AI evaluation failed:', err);
    // Silently fail — don't disrupt the interview
    const el = document.getElementById('ma-ai-rec');
    if (el) { el.className = 'ma-ai-rec'; el.style.display = 'none'; }
  }
}

function updateTranscriptBox() {
  const box = document.getElementById('ma-transcript-box');
  if (!box) return;
  let html = '';
  if (transcriptText) html += '<span class="final">' + esc(transcriptText) + '</span>';
  if (interimText) html += ' <span class="interim">' + esc(interimText) + '</span>';
  if (!html) html = '<span class="ma-transcript-empty">Transcript will appear here...</span>';
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
}

async function manualExtract() {
  const status = document.getElementById('ma-finish-status');
  status.textContent = 'Extracting profile from session data...';
  try {
    const questionsPayload = QUESTIONS.map(q => ({ id: q.id, label: q.label, section: q.section, answer: '(answered during call — see Meet transcript)' }));
    const r = await authFetch(`/api/onboarding/sessions/${sessionId}/extract`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questions: questionsPayload }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    status.innerHTML = '<span style="color:var(--lime)">Profile extracted! View it in the dashboard.</span>';
  } catch (err) {
    status.textContent = 'Failed: ' + err.message;
  }
}
