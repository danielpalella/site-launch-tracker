<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding · Meet</title>
<link rel="icon" href="/favicon.png" type="image/png" />
<style>
:root { --primary: #1259FF; --bg: #06102a; --surface: #0f1d3a; --lime: #cbff4d; --text: #fff; --text-muted: rgba(255,255,255,.5); --border: rgba(255,255,255,.1); --green: #16a34a; --red: #ef4444 }
* { margin: 0; padding: 0; box-sizing: border-box }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column }

/* Header */
.ma-header { padding: .6rem .75rem; display: flex; align-items: center; gap: .5rem; border-bottom: 1px solid var(--border); flex-shrink: 0 }
.ma-logo { height: 18px; opacity: .7 }
.ma-header-title { font-size: .7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px }

/* Auth */
.ma-auth { display: none; padding: 2rem 1rem; text-align: center }
.ma-auth input { width: 100%; padding: .5rem .7rem; border: 1px solid var(--border); border-radius: 6px; font-size: .82rem; font-family: inherit; color: var(--text); background: var(--surface); margin: .75rem 0 .5rem; box-sizing: border-box }
.ma-auth input:focus { outline: none; border-color: var(--primary) }
.ma-auth-btn { width: 100%; padding: .55rem; border: none; border-radius: 6px; background: var(--primary); color: #fff; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: inherit }
.ma-auth-err { font-size: .72rem; color: var(--red); margin-top: .3rem; display: none }

/* Phases */
.ma-phase { display: none; flex: 1; flex-direction: column; overflow: hidden }
.ma-phase.active { display: flex }

/* Client search */
.ma-search { width: 100%; padding: .5rem .7rem; border: 1px solid var(--border); border-radius: 6px; font-size: .82rem; font-family: inherit; color: var(--text); background: var(--surface); box-sizing: border-box; margin-bottom: .5rem }
.ma-search:focus { outline: none; border-color: var(--primary) }
.ma-phase-select-inner { padding: .75rem }
.ma-client { padding: .45rem .6rem; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; margin-bottom: .3rem; transition: border-color .15s }
.ma-client:hover { border-color: var(--primary) }
.ma-client-name { font-size: .8rem; font-weight: 600 }
.ma-client-meta { font-size: .68rem; color: var(--text-muted) }

/* Setup flow */
.setup-flow { padding: .5rem .75rem; border-bottom: 1px solid var(--border); flex-shrink: 0 }
.setup-step { display: flex; align-items: center; gap: .5rem; padding: .35rem 0 }
.setup-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .6rem; font-weight: 700; flex-shrink: 0; border: 1.5px solid var(--border); color: var(--text-muted); transition: all .2s }
.setup-num.done { background: var(--lime); border-color: var(--lime); color: var(--bg) }
.setup-num.current { background: var(--primary); border-color: var(--primary); color: #fff }
.setup-btn { flex: 1; padding: .4rem .6rem; border: 1px solid var(--primary); border-radius: 6px; background: none; color: var(--primary); font-size: .72rem; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: .35rem; transition: all .15s }
.setup-btn:hover { background: rgba(18,89,255,.1) }
.setup-btn.done { border-color: var(--lime); color: var(--lime); opacity: .7; cursor: default }
.setup-btn.active { background: var(--primary); color: #fff; border-color: var(--primary) }
.setup-label { flex: 1; font-size: .72rem; color: var(--text-muted) }
.setup-label.done { color: var(--lime) }

/* Scrollable content area */
.guide-scroll { flex: 1; overflow-y: auto; padding: .75rem; padding-bottom: 0 }

/* Section badges */
.ma-section-done { background: var(--surface); border-radius: 8px; padding: .5rem .65rem; margin-bottom: .5rem; border-left: 3px solid var(--lime) }
.ma-section-done-title { font-size: .72rem; font-weight: 700; color: var(--lime) }
.ma-section-done-text { font-size: .7rem; color: var(--text-muted); margin-top: .15rem }

/* Question area */
.guide-section { font-size: .6rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: .25rem }
.guide-progress { font-size: .65rem; color: var(--text-muted); margin-bottom: .5rem }
.guide-question { font-size: 1rem; font-weight: 600; line-height: 1.4; margin-bottom: .5rem }
.guide-tips { font-size: .72rem; color: var(--text-muted); line-height: 1.45; margin-bottom: .6rem; padding: .45rem .6rem; background: var(--surface); border-radius: 6px; border-left: 3px solid var(--primary) }
.guide-followups { margin-bottom: .6rem }
.guide-followups-label { font-size: .6rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .3px; margin-bottom: .2rem }
.guide-followup { font-size: .72rem; color: rgba(255,255,255,.7); padding: .15rem 0 .15rem .6rem; position: relative }
.guide-followup::before { content: ''; position: absolute; left: 0; top: .42rem; width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted) }

/* Transcript */
.transcript-box { max-height: 100px; overflow-y: auto; background: var(--surface); border-radius: 6px; padding: .4rem .5rem; margin-bottom: .5rem; font-size: .72rem; line-height: 1.5; display: none; border: 1px solid var(--border) }
.transcript-box .interim { color: var(--text-muted) }
.transcript-box .final { color: var(--text) }
.transcript-empty { color: var(--text-muted); font-style: italic }
.transcript-status { font-size: .62rem; color: var(--text-muted); margin-bottom: .3rem; display: none }
.transcript-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--lime); margin-right: 4px; vertical-align: middle; animation: ma-pulse 1.5s infinite }
@keyframes ma-pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }

/* AI recommendation */
.ai-rec { padding: .35rem .55rem; border-radius: 6px; font-size: .72rem; line-height: 1.4; margin-bottom: .5rem; display: none }
.ai-rec.ready { display: block; background: rgba(22,163,74,.12); border: 1px solid rgba(22,163,74,.25); color: #4ade80 }
.ai-rec.followup { display: block; background: rgba(234,179,8,.1); border: 1px solid rgba(234,179,8,.2); color: #facc15 }
.ai-rec.thinking { display: block; background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--text-muted) }

/* Bottom buttons — sticky */
.guide-bottom { flex-shrink: 0; padding: .75rem; border-top: 1px solid var(--border); background: var(--bg) }
.guide-btns { display: flex; gap: .5rem }
.btn-skip { flex: 0 0 auto; padding: .85rem 1.2rem; border: 1px solid var(--border); border-radius: 10px; background: none; color: var(--text-muted); font-size: .85rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: border-color .15s }
.btn-skip:hover { border-color: rgba(255,255,255,.3) }
.btn-next { flex: 1; padding: .85rem 1.2rem; border: none; border-radius: 10px; background: var(--green); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: .4rem; transition: background .15s }
.btn-next:hover { background: #15803d }
.btn-next:active { transform: scale(.98) }

/* Finish screen */
.ma-finish { display: none; padding: 1.5rem .75rem; text-align: center }
.ma-finish-title { font-size: 1rem; font-weight: 700; margin-bottom: .4rem }
.ma-finish-sub { font-size: .82rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1rem }
.ma-finish-btn { width: 100%; padding: .55rem; border: none; border-radius: 6px; background: var(--primary); color: #fff; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: .4rem }
.ma-finish-btn-outline { width: 100%; padding: .55rem; border: 1px solid var(--border); border-radius: 6px; background: none; color: var(--text); font-size: .82rem; font-weight: 600; cursor: pointer; font-family: inherit }
.ma-finish-status { font-size: .75rem; color: var(--text-muted); margin-top: .5rem }
</style>
</head>
<body>

<div class="ma-header">
  <img src="/logo-white.svg" alt="RealWork" class="ma-logo">
  <span class="ma-header-title">Onboarding Copilot</span>
</div>

<!-- Auth -->
<div class="ma-auth" id="ma-auth">
  <div style="font-size:.95rem;font-weight:700;margin-bottom:.3rem">Connect to RealWork</div>
  <div style="font-size:.78rem;color:var(--text-muted);line-height:1.4">Get your access code from the Onboarding page (click "Copy Meet Code") and paste it below.</div>
  <input type="text" id="ma-token-input" placeholder="Paste access code..." onkeydown="if(event.key==='Enter')submitToken()">
  <button class="ma-auth-btn" onclick="submitToken()">Connect</button>
  <div class="ma-auth-err" id="ma-auth-err"></div>
</div>

<!-- Phase 1: Client Selection -->
<div class="ma-phase" id="ma-phase-select">
  <div class="ma-phase-select-inner">
    <div style="font-size:.85rem;font-weight:700;margin-bottom:.5rem">Select a client</div>
    <input type="text" class="ma-search" id="ma-search" placeholder="Search clients..." oninput="searchClients()">
    <div id="ma-clients-list"></div>
  </div>
</div>

<!-- Phase 2: Interview Guide -->
<div class="ma-phase" id="ma-phase-guide">
  <!-- Setup flow steps -->
  <div class="setup-flow" id="setup-flow"></div>

  <!-- Scrollable content -->
  <div class="guide-scroll" id="guide-scroll"></div>

  <!-- Sticky bottom buttons -->
  <div class="guide-bottom" id="guide-bottom">
    <div class="guide-btns">
      <button class="btn-skip" onclick="skipQuestion()">Skip</button>
      <button class="btn-next" onclick="nextQuestion()">Next <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
  </div>
</div>

<!-- Phase 3: Finish -->
<div class="ma-finish" id="ma-finish">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--lime)" stroke-width="2" style="margin-bottom:.75rem"><circle cx="12" cy="12" r="10"/><polyline points="20 6 9 17 4 12" stroke-width="2.5"/></svg>
  <div class="ma-finish-title">Interview Complete</div>
  <div class="ma-finish-sub">Great job! The AI is extracting the client profile from the live transcript.</div>
  <div class="ma-finish-status" id="ma-finish-status"></div>
  <div id="ma-finish-retry" style="display:none;margin-top:.75rem">
    <div style="font-size:.72rem;color:var(--text-muted);margin-bottom:.4rem">Extraction didn't work? Try one of these:</div>
    <button class="ma-finish-btn-outline" onclick="importMeetTranscript()" style="margin-bottom:.4rem">Retry from Meet Transcript</button>
    <button class="ma-finish-btn-outline" onclick="manualExtract()">Retry from Saved Answers</button>
  </div>
</div>

<script src="https://www.gstatic.com/meetjs/addons/1.1.0/meet.addons.js"></script>
<script>
// ── Questions ──
const QUESTIONS = [
  { id:'origin_1', section:'Origin Story', label:'Tell me how you got started — what\'s the story behind the business?', display:'Tell us your story — how did you get into this trade and start your business?', tips:'Ask about when they started, what motivated them, how long they\'ve been in business.', followups:['How long have you been in business?','Was there a specific moment that pushed you to start your own company?'] },
  { id:'origin_2', section:'Origin Story', label:'What are you most proud of when you look at what you\'ve built?', display:'What makes you most proud about your company?', tips:'Listen for milestones, team achievements, specific projects they light up about.', followups:['Can you tell me about a project that really stands out?'] },
  { id:'origin_3', section:'Origin Story', label:'Is there a family story or personal connection tied to the business?', display:'Is there a family or personal story behind the business?', tips:'Family involvement, personal connection to the trade. This makes great About page copy.', followups:['Are any family members involved in day-to-day operations?'] },
  { id:'services_1', section:'Services', label:'Walk me through what you guys do — your core services.', display:'Walk us through your core services — what do you do?', tips:'Get the full list. Ask about residential vs commercial, emergency availability.', followups:['Do you handle both residential and commercial?','Do you offer emergency or after-hours service?'] },
  { id:'services_2', section:'Services', label:'What\'s your bread and butter, and what do you want to do more of?', display:'Which service drives the most revenue, and which do you want to grow?', tips:'Top revenue service AND what they want the website to push more.', followups:['Why do you want to push those services more?'] },
  { id:'services_3', section:'Services', label:'Take me through your process — from first call to job done.', display:'Describe your process from the first call to job completion.', tips:'This becomes the "How We Work" section. Get the step-by-step.', followups:['What happens after the job — any follow-up, warranty check-in?'] },
  { id:'diff_1', section:'Differentiation', label:'What makes you guys different? What do your customers usually say about you?', display:'What sets you apart from competitors — and what do customers say?', tips:'Their differentiators, review themes, guarantees, unique processes.', followups:['Do you use specific brands or methods that set you apart?','Do you offer any guarantees?'] },
  { id:'diff_2', section:'Differentiation', label:'Who\'s your ideal customer — the kind of job you love getting?', display:'Who is your ideal customer?', tips:'Residential vs commercial, neighborhood type, job size preference.', followups:['Is there a type of job you prefer to avoid?'] },
  { id:'area_1', section:'Service Area', label:'What areas do you cover, and where does most of your work come from?', display:'What areas do you serve, and where do you get the most work?', tips:'Cities, counties, travel radius. Top markets for city landing pages.', followups:['How far will you travel for a job?','Are there areas you want to expand into?'] },
  { id:'area_2', section:'Service Area', label:'Any neighborhoods or cities you\'re looking to break into?', display:'Are there specific areas you want to target for growth?', tips:'New markets, less competition areas. Important for SEO targeting.', followups:['Do you have any presence there already?'] },
  { id:'voice_1', section:'Brand Voice', label:'How would you describe the personality of your company?', display:'How would you describe your company\'s personality and tone?', tips:'Professional, casual, friendly — how do they talk to customers? This calibrates all copy.', followups:['How do you want customers to feel after working with you?'] },
  { id:'voice_2', section:'Brand Voice', label:'Any words or phrases you love using — or ones you\'d rather we avoid?', display:'Any words, phrases, or taglines you love — or want to avoid?', tips:'Mottos, jargon to avoid, specific language preferences.', followups:['Do you have a tagline or motto?'] },
  { id:'cred_1', section:'Credentials', label:'What licenses and certifications do you carry? Are you insured, bonded?', display:'What licenses, certifications, and insurance do you carry?', tips:'State licenses, manufacturer certs, bonded, insured. Trust signals.', followups:['Are you a member of any trade associations?'] },
  { id:'cred_2', section:'Credentials', label:'Any awards or recognitions you want people to know about?', display:'Any awards, recognitions, or highlights worth showcasing?', tips:'Google rating, best-of awards, community involvement.', followups:['How many Google reviews do you have?'] },
  { id:'goals_1', section:'Goals', label:'What are the main things you want this website to do for you?', display:'What are your top goals for the new website?', tips:'More leads, SEO, professional look. Get specific priorities.', followups:['What frustrates you about your current online presence?'] },
  { id:'goals_2', section:'Goals', label:'Six months from now, what does success look like for you?', display:'What does success look like 6 months from now?', tips:'Measurable targets — lead count, ranking goals, revenue impact.', followups:['Specific number of leads per month you\'re targeting?'] },
  { id:'goals_3', section:'Goals', label:'Anything else you want us to know about your business?', display:'Anything else we should know about your business?', tips:'Open-ended catch-all. Let them talk.', followups:[] },
];
const SECTIONS = ['Origin Story','Services','Differentiation','Service Area','Brand Voice','Credentials','Goals'];

// ── State ──
let authToken = null;
let sessionId = null;
let joinToken = null;
let currentQ = 0;
let selectedClientId = null;
let clientName = '';
let meetSession = null;
let sidePanelClient = null;
let completedSections = new Set();
let transcriptActive = false;
let transcriptText = '';
let capturePopup = null;
let transcriptChannel = null;
let interimText = '';
let questionTranscripts = {};
let currentQuestionTranscript = '';
let evalTimer = null;
let lastEvalText = '';
let aiRecState = null;
let presentationOpened = false;
let screenShared = false;
let showQuestionOnScreen = true;

function authHeaders(h = {}) { if (authToken) h['Authorization'] = 'Bearer ' + authToken; return h; }
function authFetch(url, opts = {}) { opts.headers = authHeaders(opts.headers || {}); return fetch(url, opts); }
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const checkSvg = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>';

// ── Init ──
(async () => {
  try {
    meetSession = await window.meet.addon.createAddonSession({ cloudProjectNumber: '630073859512' });
    sidePanelClient = await meetSession.createSidePanelClient();
  } catch (e) { console.warn('Meet SDK:', e.message); }

  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) {
      const tr = await fetch('/api/auth/meet-token', { credentials: 'include' });
      const td = await tr.json();
      if (td.token) {
        authToken = td.token;
        try { sessionStorage.setItem('ma-token', authToken); } catch {}
        showPhase('select');
        loadClients();
        return;
      }
    }
  } catch {}

  const params = new URLSearchParams(window.location.search);
  authToken = params.get('token');
  if (!authToken) try { authToken = sessionStorage.getItem('ma-token'); } catch {}

  if (authToken) {
    try {
      const r = await authFetch('/api/auth/me');
      if (r.ok) { showPhase('select'); loadClients(); return; }
    } catch {}
    authToken = null;
  }
  document.getElementById('ma-auth').style.display = 'block';
})();

// ── Auth ──
async function submitToken() {
  const input = document.getElementById('ma-token-input');
  const err = document.getElementById('ma-auth-err');
  authToken = input.value.trim();
  if (!authToken) { err.textContent = 'Paste your access code.'; err.style.display = 'block'; return; }
  try {
    const r = await authFetch('/api/auth/me');
    if (!r.ok) throw new Error();
    try { sessionStorage.setItem('ma-token', authToken); } catch {}
    document.getElementById('ma-auth').style.display = 'none';
    showPhase('select');
    loadClients();
  } catch {
    authToken = null;
    err.textContent = 'Invalid code. Copy it again from the Onboarding page.';
    err.style.display = 'block';
  }
}

// ── Phases ──
function showPhase(id) {
  document.querySelectorAll('.ma-phase').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('ma-phase-' + id);
  if (el) el.classList.add('active');
  document.getElementById('ma-finish').style.display = 'none';
}

// ── Client search ──
let searchTimer = null;
async function loadClients() { searchClients(); }
async function searchClients() {
  clearTimeout(searchTimer);
  const term = document.getElementById('ma-search').value.trim();
  searchTimer = setTimeout(async () => {
    try {
      const r = await authFetch(`/api/onboarding/clients${term ? '?search=' + encodeURIComponent(term) : ''}`);
      const clients = await r.json();
      const list = document.getElementById('ma-clients-list');
      if (!clients.length) { list.innerHTML = '<div style="font-size:.78rem;color:var(--text-muted);padding:.5rem 0;text-align:center">No clients found</div>'; return; }
      list.innerHTML = clients.slice(0, 15).map(c => `<div class="ma-client" onclick="selectClient(${JSON.stringify(c).replace(/"/g,'&quot;')})"><div class="ma-client-name">${esc(c.account_name)}</div><div class="ma-client-meta">${esc([c.contact_name, c.industry].filter(Boolean).join(' · '))}</div></div>`).join('');
    } catch {}
  }, 200);
}

async function selectClient(client) {
  selectedClientId = client.id;
  clientName = client.account_name;
  try {
    const r = await authFetch('/api/onboarding/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clientName, clientId: selectedClientId }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    sessionId = data.id;
    joinToken = data.join_token || null;
    currentQ = 0;
    completedSections.clear();
    presentationOpened = false;
    screenShared = false;
    showPhase('guide');
    renderSetupFlow();
    renderGuide();
  } catch (err) { alert('Failed to start: ' + err.message); }
}

// ── Setup Flow ──
function renderSetupFlow() {
  const flow = document.getElementById('setup-flow');
  if (!joinToken) { flow.innerHTML = ''; return; }

  let html = '';

  // Step 1: Start Presentation
  if (presentationOpened) {
    html += `<div class="setup-step"><div class="setup-num done">${checkSvg}</div><span class="setup-label done">Presentation opened</span></div>`;
  } else {
    html += `<div class="setup-step"><div class="setup-num current">1</div><button class="setup-btn" onclick="doStartPresentation()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Start Presentation</button></div>`;
  }

  // Step 2: Share your screen
  if (screenShared) {
    html += `<div class="setup-step"><div class="setup-num done">${checkSvg}</div><span class="setup-label done">Screen shared</span></div>`;
  } else if (presentationOpened) {
    html += `<div class="setup-step"><div class="setup-num current">2</div><button class="setup-btn" onclick="doConfirmShare()" style="flex:1">Share screen in Meet, then tap here</button></div>`;
  } else {
    html += `<div class="setup-step"><div class="setup-num">2</div><span class="setup-label">Share presentation tab in Meet</span></div>`;
  }

  // Step 3: Live Transcript
  if (transcriptActive) {
    html += `<div class="setup-step"><div class="setup-num done">${checkSvg}</div><span class="setup-label done"><span class="transcript-dot"></span>Transcript active</span></div>`;
  } else if (screenShared) {
    html += `<div class="setup-step"><div class="setup-num current">3</div><button class="setup-btn" onclick="toggleTranscript()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>Start Live Transcript</button></div>`;
  } else {
    html += `<div class="setup-step"><div class="setup-num">3</div><span class="setup-label">Start live transcript</span></div>`;
  }

  // Step 4: Begin Interview
  if (interviewBegun) {
    html += `<div class="setup-step"><div class="setup-num done">${checkSvg}</div><span class="setup-label done">Interview started</span></div>`;
  } else if (screenShared) {
    html += `<div class="setup-step"><div class="setup-num current" style="background:var(--lime);border-color:var(--lime);color:var(--bg)">4</div><button class="setup-btn" onclick="beginInterview()" style="flex:1;background:var(--lime);border-color:var(--lime);color:var(--bg);font-weight:700;justify-content:center">Begin Interview</button></div>`;
  } else {
    html += `<div class="setup-step"><div class="setup-num">4</div><span class="setup-label">Begin interview</span></div>`;
  }

  flow.innerHTML = html;
}

function doStartPresentation() {
  if (!sessionId || !joinToken) return;
  const stageUrl = `${location.origin}/meet-stage?session=${sessionId}&token=${joinToken}`;
  window.open(stageUrl, 'rw-presentation');
  presentationOpened = true;
  renderSetupFlow();

  // Don't push Q0 yet — let the welcome screen show.
  // Q0 gets pushed when the rep clicks Next (or after they confirm screen share).
}

function toggleQuestionVisibility(checked) {
  showQuestionOnScreen = checked;
  if (sessionId) {
    authFetch(`/api/onboarding/sessions/${sessionId}/answer`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questionId: null, currentQuestion: currentQ, aiMessage: showQuestionOnScreen ? (QUESTIONS[currentQ]?.display || QUESTIONS[currentQ]?.label) : '__hidden__', clearSummary: false }),
    }).catch(() => {});
  }
}

function doConfirmShare() {
  screenShared = true;
  renderSetupFlow();
}

let interviewBegun = false;
function beginInterview() {
  if (interviewBegun) return;
  interviewBegun = true;
  // Push Q0 to Firestore — transitions presentation from welcome to first question
  const q = QUESTIONS[0];
  if (q && sessionId) {
    authFetch(`/api/onboarding/sessions/${sessionId}/answer`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questionId: null, currentQuestion: 0, aiMessage: showQuestionOnScreen ? (q.display || q.label) : '__hidden__', clearSummary: true }),
    }).then(r => {
      if (r.ok) console.log('[meet-addon] Pushed Q0 — presentation will transition from welcome');
    }).catch(() => {});
  }
  renderSetupFlow();
}

// ── Interview Guide ──
function renderGuide() {
  const q = QUESTIONS[currentQ];
  if (!q) { showFinish(); return; }

  const scroll = document.getElementById('guide-scroll');
  let html = '';

  // Client name + progress
  html += `<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.5rem">`;
  html += `<div style="font-size:.85rem;font-weight:700">${esc(clientName)}</div>`;
  html += `<div class="guide-progress">Q ${currentQ + 1}/${QUESTIONS.length}</div>`;
  html += `</div>`;

  // Show/hide question toggle
  html += `<div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.6rem">`;
  html += `<label style="display:flex;align-items:center;gap:.35rem;cursor:pointer;font-size:.68rem;color:var(--text-muted)">`;
  html += `<input type="checkbox" ${showQuestionOnScreen ? 'checked' : ''} onchange="toggleQuestionVisibility(this.checked)" style="accent-color:var(--lime);width:14px;height:14px;cursor:pointer">`;
  html += `Show question on presentation</label>`;
  html += `</div>`;

  // Completed section badges
  SECTIONS.forEach((s, i) => {
    if (completedSections.has(i)) {
      html += `<div class="ma-section-done"><div class="ma-section-done-title">${esc(s)} complete</div></div>`;
    }
  });

  // Current question
  html += `<div class="guide-section">${esc(q.section)}</div>`;
  html += `<div class="guide-question">${esc(q.label)}</div>`;

  if (q.tips) {
    html += `<div class="guide-tips"><strong>Ask about:</strong> ${esc(q.tips)}</div>`;
  }

  if (q.followups?.length) {
    html += '<div class="guide-followups"><div class="guide-followups-label">Follow-up if needed</div>';
    q.followups.forEach(f => { html += `<div class="guide-followup">${esc(f)}</div>`; });
    html += '</div>';
  }

  // Transcript box (only shown when active)
  html += '<div class="transcript-status" id="transcript-status"' + (transcriptActive ? ' style="display:block"' : '') + '><span class="transcript-dot"></span>Live transcription active</div>';
  html += '<div class="transcript-box" id="transcript-box"' + (transcriptActive ? ' style="display:block"' : '') + '>' + (transcriptText || '<span class="transcript-empty">Transcript will appear here...</span>') + '</div>';

  // AI recommendation
  html += '<div class="ai-rec' + (aiRecState ? (aiRecState.action === 'next' ? ' ready' : ' followup') : '') + '" id="ai-rec">';
  if (aiRecState) {
    if (aiRecState.action === 'next') {
      html += 'Answer sounds complete &mdash; ready to move on' + (aiRecState.message ? '<br><span style="opacity:.8;font-size:.68rem">' + esc(aiRecState.message) + '</span>' : '');
    } else if (aiRecState.action === 'followup') {
      html += 'Consider asking: ' + esc(aiRecState.message);
    } else if (aiRecState.action === 'clarify') {
      html += 'Answer was unclear &mdash; try rephrasing the question';
    }
  }
  html += '</div>';

  scroll.innerHTML = html;

  // Save progress to Firestore (skip Q0 until Begin Interview is clicked — keeps welcome screen)
  if (currentQ > 0 || interviewBegun) {
    authFetch(`/api/onboarding/sessions/${sessionId}/answer`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questionId: null, currentQuestion: currentQ, aiMessage: showQuestionOnScreen ? (q.display || q.label) : '__hidden__', clearSummary: true }),
    }).then(r => {
      if (!r.ok) console.error('[meet-addon] Failed to save question state:', r.status);
      else console.log('[meet-addon] Saved question', currentQ, 'to Firestore');
    }).catch(e => console.error('[meet-addon] Save error:', e.message));
  }
}

async function nextQuestion() {
  const q = QUESTIONS[currentQ];
  const nextQ = QUESTIONS[currentQ + 1];

  questionTranscripts[currentQ] = currentQuestionTranscript;

  if (currentQuestionTranscript.trim()) {
    authFetch(`/api/onboarding/sessions/${sessionId}/answer`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        questionId: QUESTIONS[currentQ].id,
        answer: currentQuestionTranscript,
        currentQuestion: currentQ + 1,
        aiMessage: showQuestionOnScreen ? (QUESTIONS[currentQ + 1]?.display || QUESTIONS[currentQ + 1]?.label || null) : '__hidden__',
        clearSummary: true,
      }),
    }).catch(() => {});
  }

  currentQuestionTranscript = '';
  aiRecState = null;
  lastEvalText = '';

  const isEndOfSection = (nextQ && nextQ.section !== q.section) || !nextQ;
  if (isEndOfSection) {
    const sIdx = SECTIONS.indexOf(q.section);
    if (sIdx >= 0) completedSections.add(sIdx);

    const sectionQs = QUESTIONS.filter(qq => qq.section === q.section);
    const sectionAnswers = sectionQs.map(qq => {
      const idx = QUESTIONS.indexOf(qq);
      return { question: qq.label, answer: questionTranscripts[idx] || '' };
    });
    authFetch(`/api/onboarding/sessions/${sessionId}/section-summary`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sectionName: q.section, sectionIndex: sIdx, answers: sectionAnswers, clientName }),
    }).catch(() => {});
  }

  currentQ++;
  if (currentQ >= QUESTIONS.length) { showFinish(); return; }
  renderGuide();
}

function skipQuestion() {
  nextQuestion();
}

// ── Finish ──
async function showFinish() {
  if (currentQuestionTranscript) {
    questionTranscripts[currentQ] = currentQuestionTranscript;
    currentQuestionTranscript = '';
  }

  stopEvalTimer();
  aiRecState = null;

  if (transcriptActive) {
    stopTranscript();
  }

  document.querySelectorAll('.ma-phase').forEach(el => el.classList.remove('active'));
  const finishEl = document.getElementById('ma-finish');
  finishEl.style.display = 'block';
  const status = document.getElementById('ma-finish-status');

  const hasRealAnswers = Object.values(questionTranscripts).some(t => t && t.trim().length > 0);
  if (hasRealAnswers) {
    status.innerHTML = '<span style="color:var(--text-muted)">Saving transcripts...</span>';
    const savePromises = Object.entries(questionTranscripts).map(([idx, text]) => {
      if (!text || !text.trim()) return Promise.resolve();
      const q = QUESTIONS[parseInt(idx)];
      if (!q) return Promise.resolve();
      return authFetch(`/api/onboarding/sessions/${sessionId}/answer`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          questionId: q.id,
          answer: text,
          currentQuestion: parseInt(idx),
        }),
      }).catch(() => {});
    });
    await Promise.all(savePromises);

    const lastQ = QUESTIONS[QUESTIONS.length - 1];
    const lastSIdx = SECTIONS.indexOf(lastQ.section);
    if (lastSIdx >= 0 && !completedSections.has(lastSIdx)) {
      completedSections.add(lastSIdx);
      const sectionQs = QUESTIONS.filter(qq => qq.section === lastQ.section);
      const sectionAnswers = sectionQs.map(qq => {
        const idx = QUESTIONS.indexOf(qq);
        return { question: qq.label, answer: questionTranscripts[idx] || '' };
      });
      authFetch(`/api/onboarding/sessions/${sessionId}/section-summary`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sectionName: lastQ.section, sectionIndex: lastSIdx, answers: sectionAnswers, clientName }),
      }).catch(() => {});
    }

    await autoExtractFromTranscript();
  }
}

async function autoExtractFromTranscript() {
  const status = document.getElementById('ma-finish-status');
  status.innerHTML = '<span style="color:var(--text-muted)">Extracting profile from live transcript...</span>';

  try {
    const questionsPayload = QUESTIONS.map((q, i) => ({
      id: q.id,
      label: q.label,
      section: q.section,
      answer: questionTranscripts[i] || '(not discussed)',
    }));
    const r = await authFetch(`/api/onboarding/sessions/${sessionId}/extract`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questions: questionsPayload }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    status.innerHTML = '<div style="display:flex;align-items:center;gap:.4rem;justify-content:center;color:var(--lime);font-weight:600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Success — profile extracted and pushed to Drive</div>';
  } catch (err) {
    status.innerHTML = '<div style="display:flex;align-items:center;gap:.4rem;justify-content:center;color:#ef4444;font-weight:600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Failed — transcript may not have been captured</div>';
    document.getElementById('ma-finish-retry').style.display = '';
  }
}

async function importMeetTranscript() {
  const status = document.getElementById('ma-finish-status');
  const retry = document.getElementById('ma-finish-retry');
  status.innerHTML = '<span style="color:var(--text-muted)">Searching for Meet transcript in Drive...</span>';
  retry.style.display = 'none';
  try {
    const r = await authFetch(`/api/onboarding/sessions/${sessionId}/import-meet-transcript`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    status.innerHTML = '<div style="display:flex;align-items:center;gap:.4rem;justify-content:center;color:var(--lime);font-weight:600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Success — profile extracted from Meet transcript</div>';
  } catch (err) {
    status.innerHTML = '<div style="display:flex;align-items:center;gap:.4rem;justify-content:center;color:#ef4444;font-weight:600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> ' + esc(err.message) + '</div>';
    retry.style.display = '';
  }
}

// ── Live Transcript ──
let transcriptPollTimer = null;
let lastTranscriptIdx = 0;

function toggleTranscript() {
  if (transcriptActive) return;
  transcriptActive = true;
  transcriptText = '';
  interimText = '';

  try {
    capturePopup = window.open(
      '/meet-addon-capture?token=' + encodeURIComponent(authToken) + '&mode=tab',
      'audio-capture',
      'width=700,height=500,left=100,top=100'
    );
  } catch {}

  try {
    transcriptChannel = new BroadcastChannel('meet-transcript');
    transcriptChannel.onmessage = (evt) => {
      handleTranscriptMessage(evt.data);
    };
  } catch {}

  window.addEventListener('message', (evt) => {
    if (evt.data?.type === 'rw-transcript') {
      handleTranscriptMessage({ type: 'transcript', text: evt.data.text, isFinal: evt.data.isFinal });
    }
  });

  startEvalTimer();

  if (!capturePopup || capturePopup.closed) {
    const win = window.open('/meet-addon-capture?token=' + encodeURIComponent(authToken) + '&mode=tab', '_blank');
    if (!win) {
      alert('Please allow popups for this site, or open this URL manually:\n' + location.origin + '/meet-addon-capture?token=' + authToken);
    }
  }

  renderSetupFlow();
  renderGuide();
}

function stopTranscript() {
  transcriptActive = false;
  stopEvalTimer();
  if (capturePopup && !capturePopup.closed) {
    capturePopup.close();
  }
  capturePopup = null;
  if (transcriptChannel) {
    transcriptChannel.close();
    transcriptChannel = null;
  }
  interimText = '';
  renderSetupFlow();
  renderGuide();
}

function startEvalTimer() {
  stopEvalTimer();
  evalTimer = setInterval(() => { evaluateTranscript(); }, 15000);
}

function stopEvalTimer() {
  if (evalTimer) { clearInterval(evalTimer); evalTimer = null; }
}

async function evaluateTranscript() {
  const text = currentQuestionTranscript.trim();
  if (!text || text === lastEvalText) return;
  const wordCount = text.split(/\s+/).length;
  if (wordCount < 5) return;

  lastEvalText = text;
  const q = QUESTIONS[currentQ];
  if (!q) return;

  const recEl = document.getElementById('ai-rec');
  if (recEl) { recEl.className = 'ai-rec thinking'; recEl.style.display = 'block'; recEl.textContent = 'AI is evaluating the response...'; }

  try {
    const r = await authFetch('/api/onboarding/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: q.label,
        answer: text,
        followups: q.followups || [],
        sectionName: q.section,
        clientName: clientName,
        alreadyFollowedUp: false,
      }),
    });
    const data = await r.json();
    aiRecState = data;

    const el = document.getElementById('ai-rec');
    if (el) {
      if (data.action === 'next') {
        el.className = 'ai-rec ready';
        el.innerHTML = 'Answer sounds complete &mdash; ready to move on' + (data.message ? '<br><span style="opacity:.8;font-size:.68rem">' + esc(data.message) + '</span>' : '');
      } else if (data.action === 'followup') {
        el.className = 'ai-rec followup';
        el.innerHTML = 'Consider asking: ' + esc(data.message);
      } else if (data.action === 'clarify') {
        el.className = 'ai-rec followup';
        el.innerHTML = 'Answer was unclear &mdash; try rephrasing the question';
      }
    }
  } catch (err) {
    console.warn('AI evaluation failed:', err);
    const el = document.getElementById('ai-rec');
    if (el) { el.className = 'ai-rec'; el.style.display = 'none'; }
  }
}

function handleTranscriptMessage(msg) {
  if (msg.type === 'transcript') {
    if (msg.isFinal) {
      transcriptText += (transcriptText ? ' ' : '') + msg.text;
      currentQuestionTranscript += (currentQuestionTranscript ? ' ' : '') + msg.text;
      interimText = '';
    } else {
      interimText = msg.text;
    }
    updateTranscriptBox();
  } else if (msg.type === 'stopped') {
    stopTranscript();
  }
}

function updateTranscriptBox() {
  const box = document.getElementById('transcript-box');
  if (!box) return;
  let html = '';
  if (transcriptText) html += '<span class="final">' + esc(transcriptText) + '</span>';
  if (interimText) html += ' <span class="interim">' + esc(interimText) + '</span>';
  if (!html) html = '<span class="transcript-empty">Transcript will appear here...</span>';
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
}

async function manualExtract() {
  const status = document.getElementById('ma-finish-status');
  const retry = document.getElementById('ma-finish-retry');
  status.innerHTML = '<span style="color:var(--text-muted)">Extracting profile from saved answers...</span>';
  retry.style.display = 'none';
  try {
    const questionsPayload = QUESTIONS.map(q => ({ id: q.id, label: q.label, section: q.section, answer: '(answered during call — see Meet transcript)' }));
    const r = await authFetch(`/api/onboarding/sessions/${sessionId}/extract`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questions: questionsPayload }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    status.innerHTML = '<div style="display:flex;align-items:center;gap:.4rem;justify-content:center;color:var(--lime);font-weight:600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Success — profile extracted from saved answers</div>';
  } catch (err) {
    status.innerHTML = '<div style="display:flex;align-items:center;gap:.4rem;justify-content:center;color:#ef4444;font-weight:600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> ' + esc(err.message) + '</div>';
    retry.style.display = '';
  }
}
</script>
