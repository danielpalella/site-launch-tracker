<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Site Map · RealWork Labs</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; height:100vh; display:flex; flex-direction:column; background:#f1f5f9 }

  #map-header {
    display:flex; align-items:center; gap:1rem; padding:.85rem 1.4rem;
    background:#0f172a; border-bottom:1px solid #1e293b; flex-shrink:0; z-index:1000;
    position:relative;
  }
  #map-header a { color:#64748b; text-decoration:none; font-size:.82rem; display:flex; align-items:center; gap:.3rem; transition:color .15s }
  #map-header a:hover { color:#94a3b8 }
  .map-title { display:flex; align-items:center; gap:.6rem }
  .map-title-text { font-weight:700; font-size:.95rem; color:#f1f5f9 }
  .beta-badge { font-size:.62rem; font-weight:700; letter-spacing:.06em; padding:.15rem .45rem; background:#7c3aed22; color:#a78bfa; border:1px solid #7c3aed44; border-radius:5px; text-transform:uppercase }
  .map-meta { margin-left:auto; display:flex; align-items:center; gap:1.25rem }
  .map-count { font-size:.8rem; color:#64748b; white-space:nowrap }
  .legend { display:flex; gap:.85rem; flex-wrap:wrap; align-items:center }
  .legend-item { display:flex; align-items:center; gap:.3rem; font-size:.72rem; color:#94a3b8; white-space:nowrap }
  .legend-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0 }

  #map { flex:1; width:100% }

  /* Leaflet popup overrides */
  .leaflet-popup-content-wrapper { border-radius:10px!important; padding:0!important; box-shadow:0 8px 32px rgba(0,0,0,.15)!important; border:none!important }
  .leaflet-popup-content { margin:0!important }
  .leaflet-popup-tip-container { display:none }
  .iw { padding:1rem 1.1rem; min-width:210px; font-family:-apple-system,sans-serif }
  .iw-name { font-weight:700; font-size:.88rem; color:#0f172a; margin-bottom:.2rem }
  .iw-domain { font-size:.74rem; color:#64748b; margin-bottom:.55rem }
  .iw-row { display:flex; align-items:center; gap:.4rem; font-size:.75rem; color:#475569; margin-bottom:.18rem }
  .iw-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0 }
  .iw-link { display:inline-block; margin-top:.6rem; font-size:.75rem; font-weight:600; color:#6366f1; text-decoration:none }
  .iw-link:hover { text-decoration:underline }

  #loading-overlay { position:fixed; inset:0; z-index:2000; background:#f1f5f9; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:.75rem }
  .spinner { width:32px; height:32px; border:3px solid #e2e8f0; border-top-color:#6366f1; border-radius:50%; animation:spin .7s linear infinite }
  @keyframes spin { to { transform:rotate(360deg) } }
  .loading-text { font-size:.82rem; color:#64748b }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading site map…</div>
</div>

<div id="map-header">
  <a href="/dashboard">← Dashboard</a>
  <div class="map-title">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C7.6 2 4 5.6 4 10c0 6 8 14 8 14s8-8 8-14c0-4.4-3.6-8-8-8z"/><circle cx="12" cy="10" r="3"/></svg>
    <span class="map-title-text">Site Map</span>
    <span class="beta-badge">Beta</span>
  </div>
  <div class="map-meta">
    <div class="legend" id="legend"></div>
    <span class="map-count" id="site-count"></span>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const INDUSTRY_COLORS = {
  'HVAC':             '#ef4444',
  'Roofing':          '#f97316',
  'Plumbing':         '#3b82f6',
  'Electrical':       '#eab308',
  'Landscaping':      '#22c55e',
  'Cleaning Services':'#06b6d4',
  'Restoration':      '#8b5cf6',
  'Contracting':      '#84cc16',
  'Flooring':         '#d946ef',
  'Gutters':          '#64748b',
  'Other':            '#6366f1',
};
function industryColor(ind) { return INDUSTRY_COLORS[ind] || INDUSTRY_COLORS['Other']; }

function pinHTML(color, domain) {
  const faviconSrc = domain
    ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=32`
    : '/favicon.png';
  return `<div style="position:relative;width:38px;height:48px;cursor:pointer;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.28))">
    <svg width="38" height="48" viewBox="0 0 38 48" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 2C11 2 4 9 4 17C4 28 19 46 19 46S34 28 34 17C34 9 27 2 19 2z" fill="${color}" stroke="white" stroke-width="2"/>
      <circle cx="19" cy="17" r="11" fill="white"/>
    </svg>
    <img src="${faviconSrc}" width="18" height="18" style="position:absolute;top:8px;left:10px;border-radius:3px;object-fit:contain;" draggable="false" onerror="this.src='/favicon.png'"/>
  </div>`;
}

async function start() {
  try {
    const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
    if (!me?.email) { window.location = '/login'; return; }

    const { sites } = await fetch('/api/launches/map-data').then(r => r.json());

    // Init Leaflet map with Voyager tiles (light, clean)
    const map = L.map('map', { zoomControl: true }).setView([38.5, -96], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // Update header
    document.getElementById('site-count').textContent = `${sites.length} sites`;

    // Legend
    const industries = [...new Set(sites.map(s => s.industry))].sort();
    const legend = document.getElementById('legend');
    industries.forEach(ind => {
      const el = document.createElement('div');
      el.className = 'legend-item';
      el.innerHTML = `<div class="legend-dot" style="background:${industryColor(ind)}"></div>${ind}`;
      legend.appendChild(el);
    });

    // Place markers
    sites.forEach(site => {
      const color = industryColor(site.industry);
      const domain = (site.domain_name || '').replace(/^https?:\/\//,'').replace(/\/$/,'');

      const icon = L.divIcon({
        html: pinHTML(color, domain),
        className: '',
        iconSize: [38, 48],
        iconAnchor: [19, 48],
        popupAnchor: [0, -50],
      });

      const marker = L.marker([site.lat, site.lng], { icon, title: site.account_name }).addTo(map);

      const popup = L.popup({ closeButton: false, maxWidth: 240 }).setContent(`
        <div class="iw">
          <div class="iw-name">${site.account_name}</div>
          ${domain ? `<div class="iw-domain">${domain}</div>` : ''}
          <div class="iw-row"><div class="iw-dot" style="background:${color}"></div>${site.industry}</div>
          ${site.place_city ? `<div class="iw-row"><span style="opacity:.6">📍</span> ${site.place_city}</div>` : ''}
          ${domain ? `<a class="iw-link" href="https://${domain}" target="_blank" rel="noopener">Visit site ↗</a>` : ''}
        </div>
      `);

      marker.bindPopup(popup);
    });

    document.getElementById('loading-overlay').style.display = 'none';
  } catch(e) {
    document.getElementById('loading-text').textContent = 'Error: ' + e.message;
  }
}

start();
</script>
</body>
</html>
