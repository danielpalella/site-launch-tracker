<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Performance Report</title>
  <link rel="icon" href="/favicon.png" type="image/png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #06102A;
      --blue: #1259FF;
      --lime: #CCFF00;
      --bg: #f0f3fb;
      --surface: #fff;
      --border: #dde3f0;
      --text: #06102A;
      --muted: #5a6a8a;
      --radius: 12px;
      --green: #22c55e;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    .rw-header {
      background: var(--navy);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .rw-logo { display: flex; align-items: center; text-decoration: none; }
    .rw-logo img { height: 28px; width: auto; }
    .rw-tagline { font-size: .75rem; color: rgba(255,255,255,.5); }

    /* Main */
    .rw-wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* Site identity */
    .rw-site-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(6,16,42,.06);
    }
    .rw-site-favicon { width: 48px; height: 48px; border-radius: 10px; object-fit: contain; flex-shrink: 0; }
    .rw-site-name { font-size: 1.25rem; font-weight: 700; color: var(--text); line-height: 1.2; }
    .rw-site-domain { font-size: .85rem; color: var(--blue); text-decoration: none; margin-top: .25rem; display: inline-block; }
    .rw-site-domain:hover { text-decoration: underline; }
    .rw-site-meta { font-size: .78rem; color: var(--muted); margin-top: .35rem; }
    .rw-live-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); margin-right: .35rem;
      animation: pulse 2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      70%  { box-shadow: 0 0 0 5px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }

    /* Period toggle */
    .rw-period-bar {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 3px;
      width: fit-content;
      margin-bottom: 1.5rem;
    }
    .rw-period-btn {
      padding: .35rem .85rem;
      font-size: .8rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--muted);
      background: transparent;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .rw-period-btn:hover { color: var(--text); }
    .rw-period-active { background: var(--navy); color: #fff !important; font-weight: 600; }

    /* Section */
    .rw-section { margin-bottom: 1.25rem; }
    .rw-section-title {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: .6rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .rw-section-title img { width: 14px; height: 14px; border-radius: 2px; }

    /* Metric grid */
    .rw-metrics {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      box-shadow: 0 1px 4px rgba(6,16,42,.06);
    }
    .rw-metric {
      padding: 1.1rem 1rem;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .rw-metric:nth-child(4n) { border-right: none; }
    .rw-metric:last-child:nth-child(4n+1),
    .rw-metric:last-child:nth-child(4n+2),
    .rw-metric:last-child:nth-child(4n+3) { border-right: none; }
    .rw-metric-val {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.03em;
      line-height: 1;
    }
    .rw-metric-label {
      font-size: .68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-top: .35rem;
      display: flex;
      align-items: center;
      gap: .25rem;
    }
    .rw-metric-delta {
      font-size: .75rem;
      font-weight: 600;
      margin-top: .25rem;
    }
    .rw-delta-up { color: var(--green); }
    .rw-delta-down { color: #ef4444; }

    /* Tooltip */
    .rw-tip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #e8ecf4;
      color: var(--muted);
      font-size: .58rem;
      font-weight: 800;
      cursor: default;
      flex-shrink: 0;
    }
    #rw-tooltip {
      position: fixed;
      background: #06102a;
      color: #fff;
      font-size: .72rem;
      line-height: 1.5;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      padding: .4rem .6rem;
      border-radius: 6px;
      max-width: 200px;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }

    /* Top keywords */
    .rw-keywords {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(6,16,42,.06);
    }
    .rw-kw-row {
      display: flex;
      align-items: center;
      padding: .55rem 1rem;
      border-bottom: 1px solid var(--border);
      gap: .75rem;
      font-size: .82rem;
    }
    .rw-kw-row:last-child { border-bottom: none; }
    .rw-kw-query { flex: 1; color: var(--text); }
    .rw-kw-pos {
      font-size: .72rem;
      font-weight: 700;
      padding: .15rem .45rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg);
      white-space: nowrap;
    }
    .rw-kw-pos.top3  { background: #dcfce7; color: #15803d; border-color: #bbf7d0; }
    .rw-kw-pos.top10 { background: #fef9c3; color: #b45309; border-color: #fde68a; }
    .rw-kw-clicks { font-size: .75rem; color: var(--muted); white-space: nowrap; }

    /* Footer */
    .rw-footer { text-align: center; margin-top: 3rem; font-size: .75rem; color: var(--muted); }
    .rw-footer a { color: var(--blue); text-decoration: none; }
    .rw-footer a:hover { text-decoration: underline; }

    /* Loading / error */
    .rw-loading { text-align: center; padding: 4rem 1rem; color: var(--muted); }
    .rw-spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .rw-error { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: .85rem; }
    .rw-expired { background: #fff7ed; border: 1px solid #fed7aa; color: #92400e; border-radius: var(--radius); padding: 1.25rem 1.5rem; font-size: .85rem; line-height: 1.6; }
    .rw-expired strong { display: block; font-size: .95rem; margin-bottom: .35rem; }

    @media (max-width: 480px) {
      .rw-metric-val { font-size: 1.3rem; }
      .rw-metrics { grid-template-columns: 1fr 1fr; }
      .rw-metric:nth-child(2n) { border-right: none; }
      .rw-metric:nth-child(4n) { border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<div class="rw-header">
  <a class="rw-logo" href="https://realworklabs.com" target="_blank" rel="noopener">
    <img src="/logo-white.svg" alt="RealWork Labs" style="height:22px;width:auto">
  </a>
  <span class="rw-tagline">Site Performance Report</span>
</div>

<div class="rw-wrap">
  <div id="rw-content">
    <div class="rw-loading">
      <div class="rw-spinner"></div>
      Loading report…
    </div>
  </div>
</div>

<div id="rw-tooltip"></div>

<script>
const parts = location.pathname.split('/').filter(Boolean);
const id    = parts[1];
const token = parts[2];
let _data   = null;
let _period = 'mom';

const PERIOD_LABELS = { mom: 'Last 30 days', '60d': 'Last 60 days' };

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(n) {
  if (n == null || n === '') return '—';
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n/1_000).toFixed(1) + 'K';
  return String(Math.round(n));
}
function fmtDate(s) {
  if (!s) return '—';
  const p = s.slice(0,10).split('-').map(Number);
  return new Date(p[0], p[1]-1, p[2]).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
}

function weeksForPeriod(p) { return p === '60d' ? 9 : 4; }
function sumWeeks(weeks, key) { return weeks.reduce((s,w) => s + (w[key]||0), 0); }
function avgWeeks(weeks, key) { const v = weeks.filter(w=>w[key]!=null); return v.length ? v.reduce((s,w)=>s+(w[key]||0),0)/v.length : null; }

function gscTotals(gsc, p) {
  if (!gsc.available) return {};
  const n = weeksForPeriod(p);
  const slice = (gsc.weeks||[]).slice(-n);
  const clicks = sumWeeks(slice, 'clicks');
  const impressions = sumWeeks(slice, 'impressions');
  return { clicks, impressions, ctr: impressions > 0 ? Math.round(clicks/impressions*10000)/100 : 0, position: gsc.total?.position };
}
function ga4Totals(ga4, p) {
  if (!ga4.available) return {};
  const n = weeksForPeriod(p);
  const slice = (ga4.weeks||[]).slice(-n);
  const hasPerWeekData = slice.some(w => 'newUsers' in w);
  const totalSessions = sumWeeks(slice, 'sessions');
  const engSlice = slice.filter(w => w.engagementRate != null && w.sessions > 0);
  const engRate = engSlice.length && totalSessions > 0
    ? Math.round(engSlice.reduce((s, w) => s + w.engagementRate * w.sessions, 0) / totalSessions * 10) / 10
    : (ga4.total?.engagementRate ?? null);
  return {
    sessions: totalSessions,
    users: sumWeeks(slice, 'users'),
    newUsers: hasPerWeekData ? sumWeeks(slice, 'newUsers') : (ga4.total?.newUsers ?? null),
    engagementRate: engRate,
  };
}
function dudaLeads(duda, p) {
  if (!duda?.available) return null;
  const days = duda.days || [];
  const n = p === '60d' ? 60 : 30;
  const slice = days.slice(-n);
  return {
    formSubmits: slice.reduce((s,d) => s + (d.formSubmits||0), 0),
    callClicks:  slice.reduce((s,d) => s + (d.callClicks||0),  0),
  };
}

function pctDelta(weeks, key, p) {
  if (!weeks?.length) return null;
  const n = weeksForPeriod(p);
  const curr = weeks.slice(-n);
  const prev = weeks.slice(-n*2, -n);
  if (!prev.length) return null;
  const c = sumWeeks(curr, key), v = sumWeeks(prev, key);
  if (!v) return null;
  return Math.round((c - v) / v * 100);
}

function deltaHtml(pct) {
  if (pct == null) return '';
  const up = pct >= 0;
  return `<div class="rw-metric-delta ${up ? 'rw-delta-up' : 'rw-delta-down'}">${up ? '▲' : '▼'} ${Math.abs(pct)}% vs prior period</div>`;
}

function metric(val, label, deltaPct, tip) {
  return `<div class="rw-metric">
    <div class="rw-metric-val">${esc(String(val))}</div>
    <div class="rw-metric-label">${esc(label)}${tip ? `<span class="rw-tip" data-tip="${esc(tip)}">?</span>` : ''}</div>
    ${deltaHtml(deltaPct)}
  </div>`;
}

// Floating tooltip
const _tt = document.getElementById('rw-tooltip');
document.addEventListener('mouseover', e => {
  const el = e.target.closest('.rw-tip');
  if (!el) return;
  _tt.textContent = el.getAttribute('data-tip');
  _tt.style.display = 'block';
});
document.addEventListener('mousemove', e => {
  if (_tt.style.display === 'none') return;
  const x = e.clientX + 14, y = e.clientY - 36;
  _tt.style.left = Math.min(x, window.innerWidth - 220) + 'px';
  _tt.style.top  = Math.max(y, 4) + 'px';
});
document.addEventListener('mouseout', e => {
  if (!e.target.closest('.rw-tip')) _tt.style.display = 'none';
});

function render() {
  const { account_name, domain, launchDate, analyticsStartDate, gsc, ga4, duda } = _data;
  const p = _period;
  const gscT = gscTotals(gsc, p);
  const ga4T = ga4Totals(ga4, p);
  const leads = dudaLeads(duda, p);
  const startDate = analyticsStartDate || launchDate;
  const daysSince = Math.floor((Date.now() - new Date((startDate||'').replace(' ','T')+'Z')) / 86_400_000);

  const gscSection = gsc.available ? `
    <div class="rw-section">
      <div class="rw-section-title"><img src="/gsc-icon.png" alt="">Search Console <span style="font-weight:400;text-transform:none;letter-spacing:0;margin-left:.25rem">${PERIOD_LABELS[p]}</span></div>
      <div class="rw-metrics">
        ${metric(fmt(gscT.clicks), 'Organic Clicks', pctDelta(gsc.weeks,'clicks',p), 'Times someone clicked your site link in Google search results.')}
        ${metric(fmt(gscT.impressions), 'Search Impressions', pctDelta(gsc.weeks,'impressions',p), 'Times your site appeared in Google search results, even when not clicked.')}
        ${metric(gscT.ctr != null ? gscT.ctr+'%' : '—', 'Click-Through Rate', null, 'Percentage of search impressions that resulted in a click to your site.')}
        ${metric(gscT.position != null ? '#'+gscT.position : '—', 'Avg Search Position', null, 'Your average ranking in Google results. #1 is the top result — lower numbers are better.')}
      </div>
    </div>` : '';

  const ga4Section = ga4.available ? `
    <div class="rw-section">
      <div class="rw-section-title"><img src="/ga4-icon.svg" alt="">Google Analytics <span style="font-weight:400;text-transform:none;letter-spacing:0;margin-left:.25rem">${PERIOD_LABELS[p]}</span></div>
      <div class="rw-metrics">
        ${metric(fmt(ga4T.sessions), 'Website Sessions', pctDelta(ga4.weeks,'sessions',p), 'Total visits to your site, including return visits from the same person.')}
        ${metric(fmt(ga4T.users), 'Unique Visitors', pctDelta(ga4.weeks,'users',p), 'Number of individual people who visited your site during this period.')}
        ${metric(ga4T.newUsers != null ? fmt(ga4T.newUsers) : '—', 'New Visitors', null, 'First-time visitors who have never been to your site before.')}
        ${metric(ga4T.engagementRate != null ? ga4T.engagementRate+'%' : '—', 'Engagement Rate', null, 'Percentage of visits where someone scrolled, clicked, or spent 10+ seconds on your site.')}
      </div>
    </div>` : '';

  const leadsSection = leads ? `
    <div class="rw-section">
      <div class="rw-section-title"><img src="/duda-icon.png" alt="" style="border-radius:3px">Lead Activity <span style="font-weight:400;text-transform:none;letter-spacing:0;margin-left:.25rem">${PERIOD_LABELS[p]}</span></div>
      <div class="rw-metrics">
        ${metric(fmt(leads.formSubmits), 'Form Submissions', pctDelta(duda.weeks,'formSubmits',p), 'Times a visitor filled out and submitted a contact or lead form on your site.')}
        ${metric(fmt(leads.callClicks), 'Call Clicks', pctDelta(duda.weeks,'callClicks',p), 'Times a visitor clicked or tapped your phone number to call your business.')}
      </div>
    </div>` : '';

  // Only show keywords ranking on page 1 or 2 (positions 1–10)
  const goodKws = (gsc.topQueries || []).filter(q => q.position <= 10);
  const topKws = gsc.available && goodKws.length ? `
    <div class="rw-section">
      <div class="rw-section-title"><img src="/gsc-icon.png" alt="">Top Ranking Keywords</div>
      <div class="rw-keywords">
        ${goodKws.slice(0, 8).map(q => {
          const pos = q.position;
          const posClass = pos <= 3 ? 'top3' : 'top10';
          return `<div class="rw-kw-row">
            <span class="rw-kw-query">${esc(q.query)}</span>
            <span class="rw-kw-pos ${posClass}">Position ${pos ?? '—'}</span>
            <span class="rw-kw-clicks">${q.clicks} clicks</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  document.getElementById('rw-content').innerHTML = `
    <div class="rw-site-hero">
      <img class="rw-site-favicon" src="${_data.custom_favicon || `https://www.google.com/s2/favicons?domain=${esc(domain)}&sz=64`}" alt="">
      <div>
        <div class="rw-site-name">${esc(account_name)}</div>
        <a class="rw-site-domain" href="https://${esc(domain)}" target="_blank" rel="noopener">${esc(domain)}</a>
        <div class="rw-site-meta"><span class="rw-live-dot"></span>Live · ${daysSince > 0 ? daysSince + ' days online' : 'Just launched'} · Since ${fmtDate(startDate)}</div>
      </div>
    </div>

    <div class="rw-period-bar">
      <button class="rw-period-btn ${p==='mom'?'rw-period-active':''}" onclick="setPeriod('mom')">Last 30 days</button>
      <button class="rw-period-btn ${p==='60d'?'rw-period-active':''}" onclick="setPeriod('60d')">Last 60 days</button>
    </div>

    ${gscSection}${ga4Section}${leadsSection}${topKws}

    <div class="rw-footer">
      Report generated by <a href="https://realworklabs.com" target="_blank" rel="noopener">RealWork Labs</a>
    </div>
  `;
  document.title = account_name + ' — Site Performance Report';
}

function setPeriod(p) { _period = p; render(); }

(async () => {
  if (!id || !token) {
    document.getElementById('rw-content').innerHTML =
      '<div class="rw-expired"><strong>This link is no longer valid.</strong>Please ask your account manager to generate a new report link.</div>';
    return;
  }
  try {
    const r = await fetch(`/api/share/${id}/${token}`);
    if (r.status === 410) {
      document.getElementById('rw-content').innerHTML =
        '<div class="rw-expired"><strong>This report link has expired.</strong>Report links are valid for 48 hours. Please ask your account manager to generate a new one.</div>';
      return;
    }
    if (!r.ok) throw new Error('not found');
    _data = await r.json();
    render();
  } catch {
    document.getElementById('rw-content').innerHTML =
      '<div class="rw-error">This report is not available. The site may not have analytics data yet.</div>';
  }
})();
</script>
</body>
</html>
