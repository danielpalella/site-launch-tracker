<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding · RealWork</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
<style>
:root { --primary: #1259FF; --bg: #06102a; --surface: #0c1830; --lime: #cbff4d; --text: #fff; --text-muted: rgba(255,255,255,.45); --border: rgba(255,255,255,.07) }
* { margin: 0; padding: 0; box-sizing: border-box }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column }

/* Progress bar */
.progress { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,.04); z-index: 10 }
.progress-fill { height: 100%; background: var(--lime); border-radius: 0 2px 2px 0; transition: width .6s ease }

/* Header */
.header { display: flex; align-items: center; padding: .5rem 2rem; flex-shrink: 0; margin-top: 3px }
.logo { height: 22px; opacity: .7 }
.header-client { margin-left: auto; font-size: .78rem; color: var(--text-muted) }

/* Top question area */
.top-area { text-align: center; padding: .75rem 2rem .5rem; flex-shrink: 0 }
.top-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: .5rem }
.top-label.active { color: var(--lime) }
.top-label.complete { color: var(--lime) }
.top-title { font-size: 1.45rem; font-weight: 600; line-height: 1.35; max-width: 680px; margin: 0 auto; transition: opacity .3s, transform .3s }
.top-title.fading { opacity: 0; transform: translateY(6px) }
.top-sub { font-size: .78rem; color: var(--text-muted); margin-top: .6rem }

/* Progress dots */
.dots { display: flex; align-items: center; justify-content: center; gap: .35rem; padding: .35rem 0 .3rem }
.dot { width: 28px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.07); transition: background .4s }
.dot.done { background: var(--lime) }
.dot.active { background: var(--primary) }

/* Grid */
.grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr 1fr; gap: .5rem; padding: .5rem 2rem 1rem; flex: 1; min-height: 0 }
.grid-last-full { grid-column: 1 / -1 }

/* Card base */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: .75rem .9rem; transition: border-color .4s, background .4s, box-shadow .4s }

/* Card — locked (default) */
.card.locked { }
.card.locked .card-name { color: rgba(255,255,255,.35) }
.card.locked .card-desc { color: rgba(255,255,255,.2) }

/* Card — active */
.card.active { border-color: rgba(203,255,77,.3); background: rgba(203,255,77,.04) }
.card.active .card-name { color: var(--text) }
.card.active .card-desc { color: rgba(255,255,255,.55) }

/* Card — done */
.card.done { border-color: rgba(203,255,77,.15); background: rgba(203,255,77,.02) }
.card.done .card-name { color: var(--text) }

/* Card header */
.card-head { display: flex; align-items: center; gap: .45rem; margin-bottom: .3rem }
.card-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .35s }
.card-icon.locked { background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.1) }
.card-icon.active { background: var(--lime); border: 1.5px solid var(--lime) }
.card-icon.done { background: var(--lime); border: 1.5px solid var(--lime) }
.card-name { font-size: .88rem; font-weight: 700; flex: 1; transition: color .3s }
.card-badge { font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--lime); white-space: nowrap }
.card-actions { font-size: .65rem; color: var(--text-muted); white-space: nowrap }

/* Card body */
.card-desc { font-size: .76rem; line-height: 1.5; transition: color .4s }
.card-narrative { font-size: .76rem; color: rgba(255,255,255,.65); line-height: 1.55; margin-bottom: .5rem }
.card-pills { display: flex; flex-wrap: wrap; gap: .3rem }
.card-pill { font-size: .66rem; color: var(--lime); background: rgba(203,255,77,.08); border: 1px solid rgba(203,255,77,.12); padding: .18rem .5rem; border-radius: 5px; font-weight: 500 }

/* Loading */
.loading { color: var(--text-muted); font-size: .9rem }

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
@keyframes unlockPop {
  0% { transform: scale(1) }
  30% { transform: scale(1.3); box-shadow: 0 0 16px rgba(203,255,77,.35) }
  60% { transform: scale(.92) }
  100% { transform: scale(1) }
}
@keyframes cardGlow {
  0% { box-shadow: none }
  40% { box-shadow: 0 0 20px rgba(203,255,77,.12) }
  100% { box-shadow: none }
}

/* Card content fills height */
.card { display: flex; flex-direction: column }
.card-head { flex-shrink: 0 }
.card [id^="cbody-"] { flex: 1; display: flex; flex-direction: column }
.card-narrative { flex: 1 }

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; grid-template-rows: auto; padding: .5rem 1rem }
  .grid-last-full { grid-column: 1 }
  .top-title { font-size: 1.2rem }
}
</style>
</head>
<body>

<div class="progress"><div class="progress-fill" id="progress-fill"></div></div>

<div class="header">
  <img src="/logo-white.svg" alt="RealWork" class="logo">
  <div class="header-client" id="header-client"></div>
</div>

<div class="top-area" id="top-area">
  <div class="loading" id="loading">Connecting...</div>
</div>

<div class="dots" id="dots"></div>

<div class="grid" id="grid"></div>

<script>
const SECTIONS = [
  { name: 'Origin story', desc: 'How you got into the trade and built the business.' },
  { name: 'Services', desc: 'What you offer and who it\'s for.' },
  { name: 'Differentiators', desc: 'What sets you apart from competitors.' },
  { name: 'Service area', desc: 'Where you work and where you want to grow.' },
  { name: 'Brand voice', desc: 'How you talk to customers and what you stand for.' },
  { name: 'Credentials', desc: 'Licenses, certifications, awards, and recognition.' },
  { name: 'Goals', desc: 'What success looks like for you and your business.' },
];

const lockSvg = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>';
const dotSvg = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" fill="#06102a" stroke="#06102a" stroke-width="2"/></svg>';
const checkSvg = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#06102a" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>';

let lastQuestion = -1;
let lastAiMessage = '';
let completedSections = new Set();
let completedSummariesData = [];
let summariesByIndex = {};
let isComplete = false;

const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session');
const joinToken = params.get('token');

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
}

(async () => {
  try {
    await Promise.race([
      window.meet?.addon?.createAddonSession({ cloudProjectNumber: '630073859512' }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 2000))
    ]);
  } catch (e) { console.warn('Meet SDK:', e.message); }

  buildGrid();
  buildDots();

  if (!sessionId || !joinToken) {
    document.getElementById('loading').textContent = 'Waiting for interview to start...';
    return;
  }

  console.log('[stage] Starting polls for session=' + sessionId);
  poll();
  setInterval(poll, 1500);
})();

let pollFailCount = 0;
async function poll() {
  try {
    const url = `/api/join/${sessionId}/${joinToken}/state?_t=${Date.now()}`;
    const r = await fetch(url, { cache: 'no-store', credentials: 'omit' });
    if (!r.ok) { pollFailCount++; return; }
    pollFailCount = 0;
    const data = await r.json();

    if (data.completed_summaries && data.completed_summaries.length > completedSummariesData.length) {
      const prev = completedSummariesData.length;
      completedSummariesData = data.completed_summaries;
      for (let i = prev; i < completedSummariesData.length; i++) {
        const s = completedSummariesData[i];
        summariesByIndex[s.section_index] = s;
        completedSections.add(s.section_index);
        unlockCard(s.section_index, s);
      }
    }

    if (!data.active || data.status === 'extracted') { showComplete(data); return; }
    updateState(data);
  } catch (e) {
    pollFailCount++;
  }
}

function updateState(data) {
  const sIdx = sectionIndexFromQuestion(data.current_question);

  const loadingEl = document.getElementById('loading');
  if (loadingEl) loadingEl.style.display = 'none';
  document.getElementById('header-client').textContent = data.client_name || '';
  document.getElementById('progress-fill').style.width = (data.progress || 0) + '%';

  updateDots(sIdx);
  updateCardStates(sIdx);

  const changed = data.current_question !== lastQuestion || (data.current_ai_message && data.current_ai_message !== lastAiMessage);
  if (!changed) return;

  const topArea = document.getElementById('top-area');
  const titleEl = topArea.querySelector('.top-title');

  if (titleEl && lastQuestion !== -1) {
    titleEl.classList.add('fading');
    setTimeout(() => renderTopQuestion(topArea, data), 280);
  } else {
    renderTopQuestion(topArea, data);
  }

  lastQuestion = data.current_question;
  lastAiMessage = data.current_ai_message || '';
}

function renderTopQuestion(topArea, data) {
  topArea.innerHTML = `
    <div class="top-label active">${esc(data.current_section || '')} &middot; Question ${data.current_question + 1} of ${data.total_questions}</div>
    <div class="top-title" style="animation:fadeUp .3s ease">${esc(data.current_ai_message || data.current_question_label || '')}</div>
  `;
}

function showComplete(data) {
  if (isComplete) return;
  isComplete = true;

  if (data?.completed_summaries) {
    completedSummariesData = data.completed_summaries;
    completedSummariesData.forEach(s => {
      summariesByIndex[s.section_index] = s;
      completedSections.add(s.section_index);
    });
  }

  SECTIONS.forEach((_, i) => {
    completedSections.add(i);
    unlockCard(i, summariesByIndex[i]);
  });

  updateDots(-1, true);
  document.getElementById('progress-fill').style.width = '100%';

  document.getElementById('top-area').innerHTML = `
    <div class="top-label complete">INTERVIEW COMPLETE</div>
    <div class="top-title" style="animation:fadeUp .4s ease">Here's what we heard</div>
    <div class="top-sub">${SECTIONS.length} topics covered &middot; review the takeaways and action items below</div>
  `;
}

// ── Grid ──
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = SECTIONS.map((s, i) => {
    const isLast = i === SECTIONS.length - 1 && SECTIONS.length % 2 === 1;
    return `
      <div class="card locked${isLast ? ' grid-last-full' : ''}" id="card-${i}">
        <div class="card-head">
          <div class="card-icon locked" id="cicon-${i}">${lockSvg}</div>
          <span class="card-name" id="cname-${i}">${esc(s.name)}</span>
          <span class="card-badge" id="cbadge-${i}"></span>
          <span class="card-actions" id="cactions-${i}"></span>
        </div>
        <div id="cbody-${i}">
          <div class="card-desc">${esc(s.desc)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function updateCardStates(activeIdx) {
  SECTIONS.forEach((s, i) => {
    if (completedSections.has(i)) return;

    const card = document.getElementById('card-' + i);
    const icon = document.getElementById('cicon-' + i);
    const badge = document.getElementById('cbadge-' + i);
    const body = document.getElementById('cbody-' + i);

    if (i === activeIdx) {
      card.className = card.className.replace(/\b(locked|active|done)\b/g, '').trim() + ' card active';
      icon.className = 'card-icon active';
      icon.innerHTML = dotSvg;
      badge.textContent = 'IN PROGRESS';
      body.innerHTML = `<div class="card-desc">${esc(s.desc)}</div>`;
    } else {
      card.className = card.className.replace(/\b(locked|active|done)\b/g, '').trim() + ' card locked';
      icon.className = 'card-icon locked';
      icon.innerHTML = lockSvg;
      badge.textContent = '';
      body.innerHTML = `<div class="card-desc">${esc(s.desc)}</div>`;
    }
  });
}

function unlockCard(idx, summaryData) {
  const card = document.getElementById('card-' + idx);
  const icon = document.getElementById('cicon-' + idx);
  const badge = document.getElementById('cbadge-' + idx);
  const actions = document.getElementById('cactions-' + idx);
  const body = document.getElementById('cbody-' + idx);

  if (!card) return;

  card.className = card.className.replace(/\b(locked|active|done)\b/g, '').trim() + ' card done';
  card.style.animation = 'cardGlow .8s ease';

  icon.className = 'card-icon done';
  icon.innerHTML = checkSvg;
  icon.style.animation = 'unlockPop .5s ease';

  badge.textContent = '';

  if (summaryData) {
    const narrative = summaryData.narrative || '';
    const short = narrative.split(/(?<=[.!?])\s+/).slice(0, 2).join(' ');
    const unlocks = summaryData.unlocks || [];

    actions.textContent = unlocks.length + ' action' + (unlocks.length !== 1 ? 's' : '');

    let html = '';
    if (short) html += `<div class="card-narrative">${esc(short)}</div>`;
    if (unlocks.length) {
      html += '<div class="card-pills">' + unlocks.map(u => `<span class="card-pill">${esc(u)}</span>`).join('') + '</div>';
    }
    body.innerHTML = html;
  }
}

// ── Dots ──
function buildDots() {
  document.getElementById('dots').innerHTML = SECTIONS.map((_, i) => `<div class="dot" id="dot-${i}"></div>`).join('');
}

function updateDots(activeIdx, allDone) {
  SECTIONS.forEach((_, i) => {
    const dot = document.getElementById('dot-' + i);
    dot.className = 'dot';
    if (allDone || completedSections.has(i)) dot.classList.add('done');
    else if (i === activeIdx) dot.classList.add('active');
  });
}

// ── Helpers ──
function sectionIndexFromQuestion(qIdx) {
  const breaks = [0,3,6,8,10,12,14,17];
  for (let i = 0; i < breaks.length - 1; i++) { if (qIdx < breaks[i+1]) return i; }
  return 6;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
