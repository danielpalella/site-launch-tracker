<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding · RealWork</title>
<style>
:root { --primary: #1259FF; --bg: #06102a; --lime: #cbff4d; --text: #fff; --text-muted: rgba(255,255,255,.5); --border: rgba(255,255,255,.1) }
* { margin: 0; padding: 0; box-sizing: border-box }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden }

.ms-progress { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,.06); z-index: 10 }
.ms-progress-fill { height: 100%; background: var(--primary); border-radius: 0 2px 2px 0; transition: width .5s }

.ms-header { display: flex; align-items: center; padding: .5rem 1.5rem; flex-shrink: 0; margin-top: 4px }
.ms-logo { height: 22px; opacity: .7 }
.ms-header-client { margin-left: auto; font-size: .78rem; color: var(--text-muted) }

.ms-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center }
.ms-section { font-size: .75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .8px; margin-bottom: .5rem }
.ms-progress-label { font-size: .8rem; color: var(--text-muted); margin-bottom: 1.5rem }
.ms-question { font-size: 2.2rem; font-weight: 600; line-height: 1.35; max-width: 800px; transition: opacity .4s, transform .4s; min-height: 3rem }
.ms-question.fading { opacity: 0; transform: translateY(8px) }

/* Section tracker */
.ms-tracker { display: flex; align-items: center; justify-content: center; gap: 0; padding: .75rem 1.5rem; flex-shrink: 0 }
.ms-tracker-item { display: flex; align-items: center; gap: .3rem }
.ms-tracker-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .55rem; font-weight: 700; transition: all .3s }
.ms-tracker-icon.locked { background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.1); color: rgba(255,255,255,.2) }
.ms-tracker-icon.active { background: var(--primary); border: 1.5px solid var(--primary); color: #fff; box-shadow: 0 0 10px rgba(18,89,255,.3) }
.ms-tracker-icon.done { background: var(--lime); border: 1.5px solid var(--lime); color: var(--bg) }
.ms-tracker-label { font-size: .6rem; font-weight: 600; color: rgba(255,255,255,.3); white-space: nowrap }
.ms-tracker-item.active .ms-tracker-label { color: rgba(255,255,255,.7) }
.ms-tracker-item.done .ms-tracker-label { color: var(--lime) }
.ms-tracker-line { width: 20px; height: 1.5px; background: rgba(255,255,255,.08); margin: 0 .25rem; transition: background .3s }
.ms-tracker-line.done { background: var(--lime) }

.ms-loading { color: var(--text-muted); font-size: .9rem }
.ms-complete { text-align: center }
.ms-complete-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(203,255,77,.12); color: var(--lime); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem }

/* Persistent section summary pills */
.ms-summary-pill { display: inline-flex; align-items: center; gap: .35rem; padding: .3rem .7rem; background: rgba(203,255,77,.08); border: 1px solid rgba(203,255,77,.15); border-radius: 20px; font-size: .68rem; font-weight: 600; color: var(--lime); cursor: default; animation: pillIn .4s ease; white-space: nowrap }
.ms-summary-pill svg { flex-shrink: 0 }
@keyframes pillIn { from { opacity: 0; transform: scale(.85) } to { opacity: 1; transform: scale(1) } }

@keyframes unlock {
  0% { transform: scale(1); background: var(--primary); border-color: var(--primary) }
  40% { transform: scale(1.4); background: var(--lime); border-color: var(--lime); box-shadow: 0 0 24px rgba(203,255,77,.4) }
  70% { transform: scale(.9) }
  100% { transform: scale(1); background: var(--lime); border-color: var(--lime) }
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
@keyframes badgeIn { from { opacity: 0; transform: scale(.8) } to { opacity: 1; transform: scale(1) } }
@keyframes unlockItem { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }

@media (max-width: 768px) { .ms-question { font-size: 1.5rem } .ms-tracker-label { display: none } }
</style>
</head>
<body>

<div class="ms-progress"><div class="ms-progress-fill" id="ms-progress-fill"></div></div>

<div class="ms-header">
  <img src="/logo-white.svg" alt="RealWork" class="ms-logo">
  <div class="ms-header-client" id="ms-client"></div>
</div>

<div class="ms-tracker" id="ms-tracker"></div>

<!-- Section summary pills removed — tracker (1-7) already shows completion status -->

<div class="ms-main" id="ms-main">
  <div class="ms-loading" id="ms-loading">Connecting...</div>
</div>

<script src="https://www.gstatic.com/meetjs/addons/1.1.0/meet.addons.js"></script>
<script>
const SECTIONS = [
  { name: 'Story', full: 'Origin Story' },
  { name: 'Services', full: 'Services' },
  { name: 'Edge', full: 'Differentiation' },
  { name: 'Area', full: 'Service Area' },
  { name: 'Voice', full: 'Brand Voice' },
  { name: 'Creds', full: 'Credentials' },
  { name: 'Goals', full: 'Goals' },
];

let lastQuestion = -1;
let lastAiMessage = '';
let completedSections = new Set();
let completedSummariesData = []; // Accumulates full summary objects for recap
let summaryInterstitialTimer = null;

// Parse session info from URL
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session');
const joinToken = params.get('token');

// Init Meet SDK
(async () => {
  try {
    await window.meet.addon.createAddonSession({ cloudProjectNumber: '630073859512' });
  } catch (e) { console.warn('Meet SDK:', e.message); }

  buildTracker();

  if (!sessionId || !joinToken) {
    document.getElementById('ms-loading').textContent = 'Waiting for interview to start...';
    return;
  }

  // Start polling for state
  poll();
  setInterval(poll, 1500);
})();

let pollFailCount = 0;
async function poll() {
  try {
    const url = `/api/join/${sessionId}/${joinToken}/state`;
    const r = await fetch(url);
    if (!r.ok) { console.warn('[stage] Poll failed:', r.status); pollFailCount++; return; }
    pollFailCount = 0;
    const data = await r.json();
    console.log('[stage] Poll q=' + data.current_question + ' section=' + data.current_section);

    // Sync completed_summaries from server (accumulates)
    if (data.completed_summaries && data.completed_summaries.length > completedSummariesData.length) {
      completedSummariesData = data.completed_summaries;
    }

    if (!data.active || data.status === 'extracted') { showComplete(data); return; }
    updateState(data);
  } catch (e) {
    pollFailCount++;
    console.error('[stage] Poll error:', e.message, 'fails:', pollFailCount);
  }
}

function renderSummaryPills() {
  const container = document.getElementById('ms-summaries');
  if (!container) return;
  container.innerHTML = completedSummariesData.map(s =>
    `<div class="ms-summary-pill"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>${esc(s.section_name)}</div>`
  ).join('');
}

let lastSummaryIdx = -1;
let showingSummary = false;

function updateState(data) {
  const sIdx = sectionIndexFromQuestion(data.current_question);
  document.getElementById('ms-loading').style.display = 'none';
  document.getElementById('ms-client').textContent = data.client_name || '';
  document.getElementById('ms-progress-fill').style.width = (data.progress || 0) + '%';

  // Section summary with unlock animation
  if (data.section_summary && data.section_summary.section_index !== lastSummaryIdx) {
    lastSummaryIdx = data.section_summary.section_index;
    showingSummary = true;
    const ss = data.section_summary;
    // Animate the tracker
    const icon = document.getElementById('ms-tic-' + ss.section_index);
    if (icon) {
      icon.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>';
      icon.className = 'ms-tracker-icon done';
      icon.style.animation = 'unlock .6s ease forwards';
    }
    const item = document.getElementById('ms-ti-' + ss.section_index);
    if (item) item.className = 'ms-tracker-item done';
    const line = document.getElementById('ms-tl-' + ss.section_index);
    if (line) setTimeout(() => line.classList.add('done'), 400);
    completedSections.add(ss.section_index);

    // Show summary interstitial content
    const main = document.getElementById('ms-main');
    main.innerHTML = `
      <div style="max-width:600px;text-align:center;animation:fadeUp .5s ease">
        <div style="display:inline-flex;align-items:center;gap:.5rem;background:rgba(203,255,77,.1);border:1px solid rgba(203,255,77,.2);border-radius:20px;padding:.35rem .85rem;margin-bottom:1.25rem;animation:badgeIn .5s ease">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbff4d" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          <span style="font-size:.75rem;font-weight:700;color:#cbff4d;text-transform:uppercase;letter-spacing:.5px">Section ${ss.section_index + 1} of 7 Complete</span>
        </div>
        <div style="font-size:1.3rem;font-weight:700;margin-bottom:1rem">${esc(ss.section_name)}</div>
        <div style="font-size:.9rem;line-height:1.65;color:rgba(255,255,255,.8);margin-bottom:1.5rem;text-align:left">${esc(ss.narrative || '')}</div>
        <div style="font-size:.65rem;font-weight:700;color:#cbff4d;text-transform:uppercase;letter-spacing:.6px;margin-bottom:.6rem">Unlocked for your website</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:.35rem">
          ${(ss.unlocks || []).map((u, i) => `<div style="display:inline-flex;align-items:center;gap:.45rem;background:rgba(203,255,77,.06);border:1px solid rgba(203,255,77,.12);border-radius:8px;padding:.45rem .85rem;opacity:0;animation:unlockItem .4s ease ${.3 + i * .2}s forwards"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#cbff4d" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:.82rem;color:rgba(255,255,255,.85)">${esc(u)}</span></div>`).join('')}
        </div>
      </div>
    `;

    // Auto-transition from interstitial to pill view + next question after 4 seconds
    if (summaryInterstitialTimer) clearTimeout(summaryInterstitialTimer);
    summaryInterstitialTimer = setTimeout(() => {
      showingSummary = false;
      // Force re-render on next poll by resetting lastQuestion
      lastQuestion = -1;
      lastAiMessage = '';
    }, 4000);
    return;
  }

  // Still showing interstitial — don't update the main content yet
  if (showingSummary) return;

  updateTracker(sIdx);

  const changed = data.current_question !== lastQuestion || (data.current_ai_message && data.current_ai_message !== lastAiMessage);
  if (!changed) return;

  const main = document.getElementById('ms-main');

  // Fade out existing question, then render new one
  const questionEl = main.querySelector('.ms-question');
  if (questionEl && lastQuestion !== -1) {
    questionEl.classList.add('fading');
    setTimeout(() => { renderQuestion(main, data); }, 300);
  } else {
    renderQuestion(main, data);
  }

  lastQuestion = data.current_question;
  lastAiMessage = data.current_ai_message || '';
}

function renderQuestion(main, data) {
  main.innerHTML = `
    <div class="ms-section">${esc(data.current_section || '')}</div>
    <div class="ms-progress-label">Question ${data.current_question + 1} of ${data.total_questions}</div>
    <div class="ms-question" style="animation:fadeUp .4s ease">${esc(data.current_ai_message || data.current_question_label || '')}</div>
  `;
}

function showComplete(data) {
  // Sync final completed_summaries from data if available
  if (data && data.completed_summaries && data.completed_summaries.length > completedSummariesData.length) {
    completedSummariesData = data.completed_summaries;
  }

  SECTIONS.forEach((_, i) => completedSections.add(i));
  updateTracker(-1);
  renderSummaryPills();

  const main = document.getElementById('ms-main');
  let html = '<div class="ms-complete" style="animation:fadeUp .5s ease">';
  html += '<div class="ms-complete-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>';
  html += '<div style="font-size:1.3rem;font-weight:700;margin-bottom:.5rem">Interview Complete</div>';

  if (completedSummariesData.length > 0) {
    html += '<div style="font-size:.85rem;color:var(--text-muted);margin-bottom:1.25rem">Here is what we covered:</div>';
    html += '<div style="max-height:55vh;overflow-y:auto;padding:0 .25rem;width:100%">';
    completedSummariesData.forEach((s, i) => {
      const narrative = s.narrative || '';
      // Show first 2 sentences for the recap
      const shortNarrative = narrative.split(/(?<=[.!?])\s+/).slice(0, 2).join(' ');
      const unlockStr = (s.unlocks || []).join(', ');
      html += `<div style="text-align:left;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.75rem 1rem;margin-bottom:.5rem;animation:unlockItem .4s ease ${i * .1}s backwards">`;
      html += `<div style="display:flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:700;color:var(--lime);margin-bottom:.3rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>${esc(s.section_name)}</div>`;
      if (shortNarrative) html += `<div style="font-size:.78rem;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:.35rem">"${esc(shortNarrative)}"</div>`;
      if (unlockStr) html += `<div style="font-size:.7rem;color:var(--text-muted)">Unlocks: ${esc(unlockStr)}</div>`;
      html += '</div>';
    });
    html += '</div>';
  }

  html += '<div style="font-size:.9rem;color:var(--text-muted);margin-top:1rem">Thank you! Your website profile is being built.</div>';
  html += '</div>';
  main.innerHTML = html;
}

function sectionIndexFromQuestion(qIdx) {
  const breaks = [0,3,6,8,10,12,14,17];
  for (let i = 0; i < breaks.length - 1; i++) { if (qIdx < breaks[i+1]) return i; }
  return 6;
}

function buildTracker() {
  document.getElementById('ms-tracker').innerHTML = SECTIONS.map((s, i) =>
    `<div class="ms-tracker-item" id="ms-ti-${i}"><div class="ms-tracker-icon locked" id="ms-tic-${i}">${i+1}</div><span class="ms-tracker-label">${s.name}</span></div>` +
    (i < SECTIONS.length - 1 ? `<div class="ms-tracker-line" id="ms-tl-${i}"></div>` : '')
  ).join('');
}

function updateTracker(activeIdx) {
  SECTIONS.forEach((s, i) => {
    const item = document.getElementById('ms-ti-' + i);
    const icon = document.getElementById('ms-tic-' + i);
    const line = document.getElementById('ms-tl-' + i);
    item.className = 'ms-tracker-item';
    icon.className = 'ms-tracker-icon';
    if (completedSections.has(i)) {
      item.classList.add('done'); icon.classList.add('done');
      icon.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>';
      if (line) line.classList.add('done');
    } else if (i === activeIdx) {
      item.classList.add('active'); icon.classList.add('active'); icon.textContent = i + 1;
    } else {
      icon.classList.add('locked'); icon.textContent = i + 1;
    }
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
